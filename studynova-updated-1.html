<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StudyNova — Complete Class 9 NCERT Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#f7f5f0;
  --paper:#fffef9;
  --ink:#1a1814;
  --ink2:#4a4640;
  --ink3:#8a8480;
  --line:#e8e4de;
  --math:#2d5be3;
  --math-bg:#eef2fd;
  --sci:#16a34a;
  --sci-bg:#edfaf3;
  --sst:#c2410c;
  --sst-bg:#fff1ec;
  --eng:#7c3aed;
  --eng-bg:#f5f0ff;
  --hin:#b45309;
  --hin-bg:#fffbeb;
  --yellow:#fbbf24;
  --pink:#f472b6;
  --cyan:#06b6d4;
  --red:#ef4444;
  --green:#22c55e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── SIDEBAR ── */
#sidebar{
  position:fixed;top:0;left:0;bottom:0;width:280px;
  background:var(--paper);border-right:2px solid var(--line);
  display:flex;flex-direction:column;z-index:100;
  transition:transform .3s ease;
}
.sidebar-logo{
  padding:1.2rem 1.4rem;border-bottom:2px solid var(--line);
  display:flex;align-items:center;gap:.7rem;
}
.logo-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#2d5be3,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:1.1rem;font-weight:900;
}
.logo-text{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.1rem;color:var(--ink)}
.logo-sub{font-size:.7rem;color:var(--ink3);font-weight:400}

.search-wrap{padding:.8rem 1rem;border-bottom:1px solid var(--line)}
.search-box{
  width:100%;padding:.45rem .8rem;border-radius:20px;
  border:1.5px solid var(--line);background:var(--bg);
  font-family:'Outfit',sans-serif;font-size:.82rem;color:var(--ink);
  outline:none;transition:border-color .2s;
}
.search-box:focus{border-color:#2d5be3}

.subject-nav{flex:1;overflow-y:auto;padding:.5rem 0}
.subject-nav::-webkit-scrollbar{width:4px}
.subject-nav::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}

.subj-section{}
.subj-header{
  display:flex;align-items:center;gap:.6rem;
  padding:.55rem 1rem .35rem;cursor:pointer;
  font-size:.78rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  user-select:none;
}
.subj-header .s-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.subj-header .s-arrow{margin-left:auto;font-size:.65rem;transition:transform .25s;color:var(--ink3)}
.subj-section.open .s-arrow{transform:rotate(180deg)}

.ch-list{display:none;padding:0 0 .4rem}
.subj-section.open .ch-list{display:block}
.ch-item{
  display:flex;align-items:center;gap:.6rem;
  padding:.38rem 1rem .38rem 1.8rem;
  font-size:.81rem;color:var(--ink2);cursor:pointer;
  border-left:3px solid transparent;
  transition:all .15s;line-height:1.3;
}
.ch-item:hover{background:var(--bg);color:var(--ink)}
.ch-item.active{background:var(--bg);font-weight:600;border-left-color:currentColor}
.ch-num-badge{
  min-width:20px;height:20px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-size:.65rem;font-weight:700;flex-shrink:0;
  background:var(--line);color:var(--ink3);
}
.ch-item.active .ch-num-badge{color:#fff}

/* Progress bar in sidebar */
.ch-progress-wrap{
  margin-left:auto;display:flex;align-items:center;gap:.4rem;
}
.ch-progress-bar{
  width:40px;height:6px;background:var(--line);border-radius:3px;overflow:hidden;
}
.ch-progress-fill{
  height:100%;background:var(--green);border-radius:3px;transition:width .3s;
}
.ch-progress-text{font-size:.65rem;color:var(--ink3);min-width:28px;text-align:right}

/* Home button in sidebar */
.sidebar-home-btn{
  display:flex;align-items:center;gap:.7rem;
  padding:.6rem 1rem;margin:.5rem .7rem .2rem;
  border-radius:12px;cursor:pointer;
  background:linear-gradient(135deg,#2d5be3,#7c3aed);
  color:#fff;font-weight:700;font-size:.82rem;
  border:none;font-family:'Outfit',sans-serif;
  transition:all .2s;box-shadow:0 4px 14px rgba(45,91,227,.3);
}
.sidebar-home-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,91,227,.4)}
.sidebar-home-btn .home-icon{font-size:1rem}

/* PYQ section styles */
.pyq-section{margin-bottom:1.2rem}
.pyq-header{
  display:flex;align-items:center;gap:.7rem;
  padding:1rem 1.2rem;
  background:linear-gradient(135deg,#fef3c7,#fde68a);
  border:2px solid #f59e0b;border-radius:16px 16px 0 0;
  font-weight:800;font-size:.9rem;color:#92400e;
}
.pyq-badge{
  background:#f59e0b;color:#fff;
  padding:.2rem .6rem;border-radius:20px;
  font-size:.65rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  margin-left:auto;
}
.pyq-body{
  background:var(--paper);border:2px solid #f59e0b;border-top:none;
  border-radius:0 0 16px 16px;padding:1rem;
}
.pyq-card{
  background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;
  padding:1rem 1.1rem;margin-bottom:.8rem;
  border-left:4px solid #f59e0b;
  transition:box-shadow .2s;
}
.pyq-card:last-child{margin-bottom:0}
.pyq-card:hover{box-shadow:0 4px 16px rgba(245,158,11,.15)}
.pyq-meta{
  display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;flex-wrap:wrap;
}
.pyq-year{background:#f59e0b;color:#fff;padding:.15rem .5rem;border-radius:10px;font-size:.65rem;font-weight:700}
.pyq-marks{background:#ede9fe;color:#6d28d9;padding:.15rem .5rem;border-radius:10px;font-size:.65rem;font-weight:700}
.pyq-type{background:#e0f2fe;color:#0369a1;padding:.15rem .5rem;border-radius:10px;font-size:.65rem;font-weight:700}
.pyq-q{font-weight:600;font-size:.85rem;color:var(--ink);line-height:1.55;margin-bottom:.5rem}
.pyq-ans-toggle{
  background:none;border:1.5px solid #f59e0b;color:#92400e;
  padding:.25rem .7rem;border-radius:20px;font-size:.72rem;font-weight:700;
  cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;
}
.pyq-ans-toggle:hover{background:#f59e0b;color:#fff}
.pyq-answer{
  display:none;margin-top:.6rem;padding:.7rem .9rem;
  background:#fff;border:1.5px dashed #fde68a;border-radius:10px;
  font-size:.8rem;line-height:1.6;color:var(--ink2);
}
.pyq-answer.show{display:block}

/* ── MAIN ── */
#main{margin-left:280px;min-height:100vh;transition:margin .3s}

/* ── TOP BAR ── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(247,245,240,.92);backdrop-filter:blur(12px);
  border-bottom:2px solid var(--line);
  padding:.7rem 2rem;
  display:flex;align-items:center;justify-content:space-between;
  gap:1rem;
}
.topbar-left{display:flex;align-items:center;gap:.8rem}
.menu-btn{
  display:none;width:32px;height:32px;border-radius:8px;
  border:1.5px solid var(--line);background:transparent;cursor:pointer;
  font-size:1rem;color:var(--ink);align-items:center;justify-content:center;
}
.breadcrumb{font-size:.82rem;color:var(--ink3)}
.breadcrumb span{color:var(--ink);font-weight:600}
.view-toggles{display:flex;gap:.4rem}
.view-btn{
  padding:.3rem .75rem;border-radius:20px;font-size:.75rem;font-weight:600;
  border:1.5px solid var(--line);background:transparent;cursor:pointer;
  color:var(--ink2);transition:all .2s;font-family:'Outfit',sans-serif;
}
.view-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ── WELCOME ── */
#welcome{padding:3rem 2rem;max-width:900px;margin:0 auto}
.welcome-hero{
  background:var(--paper);border:2px solid var(--line);border-radius:20px;
  padding:2.5rem;margin-bottom:2rem;
  background-image:
    radial-gradient(circle at 90% 10%, rgba(45,91,227,.07) 0%,transparent 50%),
    radial-gradient(circle at 10% 90%, rgba(124,58,237,.05) 0%,transparent 50%);
}
.welcome-hero h1{
  font-family:'Outfit',sans-serif;font-weight:900;
  font-size:clamp(2rem,5vw,3.2rem);line-height:1.1;letter-spacing:-1.5px;
  margin-bottom:.8rem;
}
.welcome-hero h1 .hi{color:var(--math)}
.welcome-hero p{color:var(--ink2);font-size:1rem;line-height:1.7;max-width:500px;margin-bottom:1.5rem}
.subject-cards-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;
}
.subj-card{
  border-radius:16px;padding:1.2rem;cursor:pointer;
  border:2px solid transparent;transition:all .22s;
  position:relative;overflow:hidden;
}
.subj-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.subj-card .sc-icon{font-size:2rem;margin-bottom:.5rem;display:block}
.subj-card .sc-name{font-weight:700;font-size:.9rem;margin-bottom:.2rem}
.subj-card .sc-count{font-size:.72rem;opacity:.7}

/* Overall progress in welcome */
.overall-progress{
  background:var(--paper);border:2px solid var(--line);border-radius:16px;
  padding:1.5rem;margin-top:1.5rem;
}
.overall-progress h3{font-size:1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.progress-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1rem}
.stat-box{text-align:center;padding:1rem;background:var(--bg);border-radius:12px}
.stat-box .stat-num{font-size:1.8rem;font-weight:800;color:var(--math)}
.stat-box .stat-label{font-size:.75rem;color:var(--ink3);margin-top:.2rem}

/* ── CHAPTER PAGE ── */
#chapter-view{display:none;padding:1.5rem 2rem;max-width:980px;margin:0 auto}
.ch-page-header{margin-bottom:1.5rem}
.ch-page-title{
  font-family:'Outfit',sans-serif;font-weight:900;
  font-size:clamp(1.6rem,3vw,2.4rem);letter-spacing:-1px;margin-bottom:.4rem;
}
.ch-meta{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.ch-pill{
  padding:.25rem .7rem;border-radius:20px;font-size:.72rem;font-weight:700;
}
.difficulty-easy{background:#dcfce7;color:#15803d}
.difficulty-medium{background:#fef9c3;color:#a16207}
.difficulty-hard{background:#fee2e2;color:#b91c1c}
.imp-pill{background:#ede9fe;color:#6d28d9}
.exam-pill{background:#e0f2fe;color:#0369a1}

/* Chapter progress indicator */
.chapter-progress{
  display:flex;align-items:center;gap:1rem;
  background:var(--bg);padding:.8rem 1rem;border-radius:12px;margin-bottom:1rem;
}
.chapter-progress-label{font-size:.8rem;font-weight:600;color:var(--ink2)}
.chapter-progress-bar{flex:1;height:10px;background:var(--line);border-radius:5px;overflow:hidden}
.chapter-progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#84cc16);border-radius:5px;transition:width .5s ease}
.chapter-progress-text{font-size:.85rem;font-weight:700;color:var(--green)}
.mark-complete-btn{
  padding:.4rem 1rem;border-radius:20px;border:none;background:var(--math);color:#fff;
  font-family:'Outfit',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;
  transition:all .2s;
}
.mark-complete-btn:hover{background:#1e40af}
.mark-complete-btn.completed{background:var(--green)}

/* View modes container */
.view-container{}

/* ── VISUAL NOTES (default) ── */
.visual-notes{}

/* Concept Map */
.concept-map{
  background:var(--paper);border:2px solid var(--line);border-radius:16px;
  padding:1.5rem;margin-bottom:1.2rem;position:relative;overflow:hidden;
}
.concept-map::before{
  content:'';position:absolute;inset:0;opacity:.4;
  background-image:radial-gradient(circle,var(--line) 1px,transparent 1px);
  background-size:24px 24px;pointer-events:none;
}
.concept-map-inner{position:relative;z-index:1}
.cm-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--ink3);margin-bottom:1.2rem}

/* Central bubble + branches */
.mind-map{display:flex;align-items:flex-start;gap:1.5rem;flex-wrap:wrap}
.mm-center{
  background:var(--ink);color:#fff;border-radius:14px;
  padding:.8rem 1.2rem;font-weight:800;font-size:.95rem;
  min-width:130px;text-align:center;align-self:center;
  flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,.15);
}
.mm-branches{display:flex;flex-wrap:wrap;gap:.8rem;flex:1}
.mm-branch{
  border-radius:12px;padding:.7rem 1rem;
  font-size:.82rem;font-weight:600;line-height:1.4;
  border:2px solid transparent;cursor:pointer;
  transition:transform .18s,box-shadow .18s;
  position:relative;
}
.mm-branch:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.mm-branch .b-title{font-weight:800;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem;opacity:.7}
.mm-branch .b-body{font-size:.8rem;line-height:1.5}

/* Timeline */
.visual-timeline{
  background:var(--paper);border:2px solid var(--line);border-radius:16px;
  padding:1.5rem;margin-bottom:1.2rem;overflow-x:auto;
}
.tl-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--ink3);margin-bottom:1.2rem}
.tl-track{
  display:flex;gap:0;position:relative;padding-bottom:1rem;min-width:max-content;
}
.tl-track::before{
  content:'';position:absolute;bottom:1.5rem;left:20px;right:20px;height:3px;
  background:linear-gradient(90deg,var(--math),var(--eng),var(--sci));border-radius:2px;
}
.tl-item{
  display:flex;flex-direction:column;align-items:center;gap:.5rem;
  min-width:120px;padding:0 .5rem;position:relative;
  cursor:pointer;
}
.tl-card{
  background:var(--paper);border:2px solid var(--line);border-radius:12px;
  padding:.6rem .8rem;font-size:.75rem;text-align:center;
  line-height:1.4;transition:all .2s;width:110px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}
.tl-item:hover .tl-card{border-color:var(--math);transform:translateY(-3px);box-shadow:0 6px 20px rgba(45,91,227,.15)}
.tl-card .tl-date{font-weight:800;font-size:.8rem;color:var(--math);margin-bottom:.2rem}
.tl-card .tl-event{font-weight:500}
.tl-dot{
  width:16px;height:16px;border-radius:50%;background:var(--ink);
  border:3px solid var(--paper);z-index:1;flex-shrink:0;
  box-shadow:0 0 0 2px var(--ink);
}
.tl-item:hover .tl-dot{background:var(--math);box-shadow:0 0 0 2px var(--math)}

/* Process Flow */
.process-flow{
  background:var(--paper);border:2px solid var(--line);border-radius:16px;
  padding:1.5rem;margin-bottom:1.2rem;
}
.pf-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--ink3);margin-bottom:1.2rem}
.pf-steps{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.pf-step{
  background:var(--bg);border:2px solid var(--line);border-radius:12px;
  padding:.7rem 1rem;font-size:.82rem;font-weight:600;
  text-align:center;min-width:100px;flex:1;
  cursor:pointer;transition:all .2s;position:relative;
}
.pf-step:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.pf-step .step-num{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:800;color:#fff;
  margin:0 auto .4rem;
}
.pf-step .step-label{font-size:.75rem;line-height:1.4}
.pf-arrow{color:var(--ink3);font-size:1.2rem;flex-shrink:0}

/* Comparison table visual */
.compare-grid{
  background:var(--paper);border:2px solid var(--line);border-radius:16px;
  padding:1.5rem;margin-bottom:1.2rem;overflow-x:auto;
}
.compare-grid .cg-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--ink3);margin-bottom:1rem}
.cg-table{width:100%;border-collapse:collapse;font-size:.82rem}
.cg-table th{
  background:var(--ink);color:#fff;padding:.6rem .8rem;
  text-align:left;font-weight:700;font-size:.75rem;letter-spacing:.3px;
}
.cg-table th:first-child{border-radius:8px 0 0 8px}
.cg-table th:last-child{border-radius:0 8px 8px 0}
.cg-table td{
  padding:.55rem .8rem;border-bottom:1px solid var(--line);
  vertical-align:top;line-height:1.5;color:var(--ink2);
}
.cg-table tr:last-child td{border-bottom:none}
.cg-table tr:hover td{background:var(--bg)}

/* Highlight boxes */
.highlight-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.8rem;margin-bottom:1.2rem}
.hl-box{
  border-radius:14px;padding:1rem 1.1rem;
  border-left:4px solid transparent;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
}
.hl-box:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.hl-box .hl-icon{font-size:1.4rem;margin-bottom:.4rem}
.hl-box .hl-title{font-weight:800;font-size:.82rem;margin-bottom:.3rem}
.hl-box .hl-body{font-size:.78rem;line-height:1.6;color:var(--ink2)}
.hl-yellow{background:#fffbeb;border-color:#fbbf24}
.hl-blue{background:#eff6ff;border-color:#3b82f6}
.hl-green{background:#f0fdf4;border-color:#22c55e}
.hl-purple{background:#faf5ff;border-color:#a855f7}
.hl-red{background:#fff1f2;border-color:#f43f5e}
.hl-orange{background:#fff7ed;border-color:#f97316}

/* Formula cards */
.formula-strip{
  display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1.2rem;
}
.formula-card{
  background:linear-gradient(135deg,#1e3a8a,#2d5be3);
  color:#fff;border-radius:14px;padding:1rem 1.2rem;
  font-size:.85rem;flex:1;min-width:180px;
  cursor:pointer;transition:transform .2s;
}
.formula-card:hover{transform:scale(1.02)}
.formula-card .fc-label{font-size:.65rem;text-transform:uppercase;letter-spacing:2px;opacity:.7;margin-bottom:.4rem}
.formula-card .fc-expr{font-family:'Lora',serif;font-size:1.1rem;font-weight:600;margin-bottom:.3rem}
.formula-card .fc-desc{font-size:.72rem;opacity:.8;line-height:1.5}

/* Popup tooltip on hover */
.has-popup{cursor:pointer;border-bottom:2px dashed currentColor}
.popup-box{
  position:fixed;z-index:999;background:var(--ink);color:#fff;
  border-radius:12px;padding:.8rem 1rem;font-size:.8rem;line-height:1.5;
  max-width:260px;box-shadow:0 8px 32px rgba(0,0,0,.25);
  pointer-events:none;opacity:0;transition:opacity .15s;
}
.popup-box.show{opacity:1}

/* Section headers inside chapter */
.section-divider{
  display:flex;align-items:center;gap:.8rem;margin:1.5rem 0 .8rem;
}
.section-divider .sd-line{flex:1;height:2px;background:var(--line);border-radius:1px}
.section-divider .sd-label{
  font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:2.5px;
  color:var(--ink3);white-space:nowrap;
}

/* Flashcards in visual mode */
.visual-flashcards{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.8rem;
  margin-bottom:1.2rem;
}
.vfc{
  height:140px;perspective:600px;cursor:pointer;
}
.vfc-inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;transition:transform .45s cubic-bezier(.16,1,.3,1);
}
.vfc.flipped .vfc-inner{transform:rotateY(180deg)}
.vfc-face{
  position:absolute;inset:0;backface-visibility:hidden;
  border-radius:14px;padding:1rem;
  display:flex;flex-direction:column;justify-content:center;
}
.vfc-front{background:var(--paper);border:2px solid var(--line)}
.vfc-back{background:var(--ink);color:#fff;transform:rotateY(180deg)}
.vfc-face .vf-label{font-size:.62rem;text-transform:uppercase;letter-spacing:2px;opacity:.5;margin-bottom:.4rem}
.vfc-face .vf-text{font-size:.85rem;font-weight:600;line-height:1.5}
.vfc-face .vf-hint{font-size:.65rem;opacity:.4;margin-top:.5rem}

/* MCQ visual */
.visual-mcq{}
.vmcq-card{
  background:var(--paper);border:2px solid var(--line);border-radius:16px;
  padding:1.2rem;margin-bottom:.8rem;
}
.vmcq-q{font-weight:700;font-size:.9rem;margin-bottom:.9rem;line-height:1.5}
.vmcq-opts{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
@media(max-width:480px){.vmcq-opts{grid-template-columns:1fr}}
.vmcq-opt{

      {id:"m12",num:12,name:"Heron's Formula",diff:"easy",imp:true,
       visual:`
<div class="formula-strip">
  <div class="formula-card"><div class="fc-label">Semi-Perimeter</div><div class="fc-expr">s = (a + b + c) / 2</div><div class="fc-desc">Half the perimeter of the triangle</div></div>
  <div class="formula-card"><div class="fc-label">Heron's Formula</div><div class="fc-expr">Area = √(s(s-a)(s-b)(s-c))</div><div class="fc-desc">Works for ANY triangle given all 3 sides</div></div>
</div>
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>📐 Step-by-Step: Heron's Formula</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="process-flow"><div class="pf-steps">
  <div class="pf-step"><div class="step-num" style="background:var(--math)">1</div><div class="step-label">Write sides a, b, c</div></div>
  <div class="pf-arrow">→</div>
  <div class="pf-step"><div class="step-num" style="background:var(--sci)">2</div><div class="step-label">Find s = (a+b+c)/2</div></div>
  <div class="pf-arrow">→</div>
  <div class="pf-step"><div class="step-num" style="background:var(--eng)">3</div><div class="step-label">Find (s-a), (s-b), (s-c)</div></div>
  <div class="pf-arrow">→</div>
  <div class="pf-step"><div class="step-num" style="background:var(--sst)">4</div><div class="step-label">Area = √(s(s-a)(s-b)(s-c))</div></div>
</div></div>
<div class="sticky sticky-yellow">Example: Triangle with sides 3, 4, 5 → s=6 → Area = √(6·3·2·1) = √36 = 6 cm²</div>
</div></div>
<div class="highlight-grid">
  <div class="hl-box hl-yellow"><div class="hl-icon">⭐</div><div class="hl-title">Why Heron's?</div><div class="hl-body">Use when height is unknown. Works for scalene, isosceles, equilateral, any triangle!</div></div>
  <div class="hl-box hl-green"><div class="hl-icon">📏</div><div class="hl-title">Special: Equilateral</div><div class="hl-body">Area = (√3/4) × a² where a = side length</div></div>
</div>`,
       flashcards:[
         {q:"State Heron's Formula.",a:"Area = √(s(s-a)(s-b)(s-c)) where s=(a+b+c)/2 is the semi-perimeter and a,b,c are the sides."},
         {q:"Find area of triangle with sides 5, 12, 13.",a:"s=(5+12+13)/2=15. Area=√(15·10·3·2)=√900=30 cm²"},
         {q:"When is Heron's formula preferred?",a:"When the height is not given but all three sides are known."},
       ],
       mcqs:[
         {q:"Semi-perimeter of triangle with sides 7, 8, 9 is:",opts:["12","24","12.5","13"],ans:0,exp:"s = (7+8+9)/2 = 24/2 = 12"},

       ],
       resources:[
         {name:"NCERT Ch12 PDF",type:"Official Textbook",url:"https://ncert.nic.in/textbook/pdf/iemh112.pdf",icon:"📄"},

         {name:"Heron's Formula Application — PW",type:"🎥 Solved Examples",url:"https://www.youtube.com/watch?v=eoJGCKlIhP0",icon:"🎥"},

       pyqs:[

         {year:"2022",marks:3,type:"Short Answer",q:"A triangular park has sides 40m, 32m, 24m. Gardener charges ₹1.25/m². Find cost.",ans:"s = 48, Area = √(48×8×16×24) = <strong>384 m²</strong><br>Cost = 384 × 1.25 = <strong>₹480</strong>"},

      {id:"m15",num:15,name:"Probability",diff:"easy",imp:true,
       visual:`
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>🎲 Understanding Probability</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="formula-strip">
  <div class="formula-card"><div class="fc-label">Probability Formula</div><div class="fc-expr">P(E) = Favourable outcomes / Total outcomes</div><div class="fc-desc">P(E) = n(E) / n(S)</div></div>
</div>
<div class="highlight-grid">
  <div class="hl-box hl-blue"><div class="hl-icon">0️⃣</div><div class="hl-title">Impossible Event</div><div class="hl-body">P(E) = 0<br>Event can never happen</div></div>
  <div class="hl-box hl-green"><div class="hl-icon">1️⃣</div><div class="hl-title">Certain Event</div><div class="hl-body">P(E) = 1<br>Event will definitely happen</div></div>
  <div class="hl-box hl-yellow"><div class="hl-icon">½</div><div class="hl-title">Equally Likely</div><div class="hl-body">P(E) = 0.5<br>Event has equal chance</div></div>
</div>
</div></div>
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>🎯 Common Examples</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="compare-grid" style="border:none;padding:0"><table class="cg-table">
  <tr><th>Experiment</th><th>Total Outcomes</th><th>Example Event</th><th>P(Event)</th></tr>
  <tr><td>Toss a coin</td><td>2 (H, T)</td><td>Getting Head</td><td>1/2</td></tr>
  <tr><td>Roll a die</td><td>6 (1-6)</td><td>Getting even number</td><td>3/6 = 1/2</td></tr>

<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>⚗️ Separation Techniques</h3><button class="sb-toggle">▼</button></div><div class="sb-body">

  <div class="hl-box hl-green"><div class="hl-icon">💧</div><div class="hl-title">Filtration</div><div class="hl-body">Separate insoluble solid from liquid. Ex: Sand from water.</div></div>

  <div class="hl-box hl-orange"><div class="hl-icon">🌡️</div><div class="hl-title">Distillation</div><div class="hl-body">Separate miscible liquids by boiling point. Ex: Water + alcohol.</div></div>

<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>📊 Atomic Models</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="highlight-grid">
  <div class="hl-box hl-yellow"><div class="hl-icon">🍮</div><div class="hl-title">Thomson's Model</div><div class="hl-body">Plum pudding model — electrons embedded in positive sphere.</div></div>
  <div class="hl-box hl-red"><div class="hl-icon">🎯</div><div class="hl-title">Rutherford's Model</div><div class="hl-body">Nuclear model — dense nucleus with electrons orbiting. Gold foil experiment.</div></div>
  <div class="hl-box hl-blue"><div class="hl-icon">⚛️</div><div class="hl-title">Bohr's Model</div><div class="hl-body">Electrons in fixed energy shells (K, L, M, N...)</div></div>
</div>
</div></div>
<div class="formula-strip">
  <div class="formula-card"><div class="fc-label">Atomic Number (Z)</div><div class="fc-expr">Z = Number of protons</div><div class="fc-desc">Also = Number of electrons (neutral atom)</div></div>
  <div class="formula-card"><div class="fc-label">Mass Number (A)</div><div class="fc-expr">A = Protons + Neutrons</div><div class="fc-desc">A = Z + N (where N = neutrons)</div></div>
  <div class="formula-card"><div class="fc-label">Electronic Configuration</div><div class="fc-expr">2, 8, 8, 18...</div><div class="fc-desc">Max e⁻ in shell n = 2n²</div></div>
</div>
<div class="highlight-grid">
  <div class="hl-box hl-green"><div class="hl-icon">🔑</div><div class="hl-title">Valency</div><div class="hl-body">Combining capacity = electrons gained/lost/shared to achieve octet.</div></div>
  <div class="hl-box hl-purple"><div class="hl-icon">🔄</div><div class="hl-title">Isotopes</div><div class="hl-body">Same atomic number, different mass number. Ex: C-12, C-14</div></div>
  <div class="hl-box hl-orange"><div class="hl-icon">⚖️</div><div class="hl-title">Isobars</div><div class="hl-body">Same mass number, different atomic number. Ex: Ar-40, Ca-40</div></div>
</div>`,

      {id:"s5",num:5,name:"The Fundamental Unit of Life",diff:"medium",imp:true,

<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>🏭 Cell Organelles & Their Functions</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="highlight-grid">
  <div class="hl-box hl-yellow"><div class="hl-icon">🧬</div><div class="hl-title">Nucleus</div><div class="hl-body">"Control centre" — contains DNA, controls all cell activities, heredity.</div></div>
  <div class="hl-box hl-orange"><div class="hl-icon">⚡</div><div class="hl-title">Mitochondria</div><div class="hl-body">"Powerhouse of the cell" — produces ATP energy through respiration.</div></div>
  <div class="hl-box hl-green"><div class="hl-icon">🌿</div><div class="hl-title">Chloroplast</div><div class="hl-body">"Kitchen of the cell" — in plant cells only; contains chlorophyll; does photosynthesis.</div></div>
  <div class="hl-box hl-blue"><div class="hl-icon">📦</div><div class="hl-title">Endoplasmic Reticulum</div><div class="hl-body">Transport network. Rough ER: has ribosomes, makes proteins. Smooth ER: makes lipids.</div></div>

      {id:"s8",num:8,name:"Motion",diff:"hard",imp:true,
       visual:`
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>🏃 Speed vs Velocity — The Key Difference</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="compare-grid" style="border:none;padding:0"><table class="cg-table">
  <tr><th></th><th>Speed</th><th>Velocity</th></tr>
  <tr><td><strong>Type</strong></td><td>Scalar</td><td>Vector</td></tr>
  <tr><td><strong>Formula</strong></td><td>Distance/Time</td><td>Displacement/Time</td></tr>
  <tr><td><strong>Direction</strong></td><td>No direction</td><td>Has direction</td></tr>
  <tr><td><strong>Can be -ve?</strong></td><td>Never</td><td>Yes (opposite direction)</td></tr>
  <tr><td><strong>Example</strong></td><td>60 km/h</td><td>60 km/h North</td></tr>
</table></div>
</div></div>
<div class="formula-strip">
  <div class="formula-card"><div class="fc-label">1st Equation</div><div class="fc-expr">v = u + at</div><div class="fc-desc">Final vel = Initial vel + (accel × time)</div></div>
  <div class="formula-card"><div class="fc-label">2nd Equation</div><div class="fc-expr">s = ut + ½at²</div><div class="fc-desc">Displacement with uniform acceleration</div></div>
  <div class="formula-card"><div class="fc-label">3rd Equation</div><div class="fc-expr">v² = u² + 2as</div><div class="fc-desc">When time is not given</div></div>
</div>
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>📈 Graphs of Motion — Visual Guide</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="highlight-grid">
  <div class="hl-box hl-blue"><div class="hl-icon">📊</div><div class="hl-title">Distance-Time Graph</div><div class="hl-body"><strong>Slope = Speed</strong><br>Straight line → uniform speed<br>Curved → non-uniform speed<br>Horizontal → at rest</div></div>
  <div class="hl-box hl-green"><div class="hl-icon">📈</div><div class="hl-title">Velocity-Time Graph</div><div class="hl-body"><strong>Slope = Acceleration</strong><br><strong>Area under = Displacement</strong><br>Horizontal → uniform velocity<br>Straight line → uniform accel</div></div>
  <div class="hl-box hl-purple"><div class="hl-icon">🔵</div><div class="hl-title">Uniform Circular Motion</div><div class="hl-body">Speed is constant but velocity changes (direction changes). Hence it IS accelerated motion.</div></div>
</div>
</div></div>
<div class="highlight-grid">

<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>⚡ Newton's 3 Laws — Visual Cards</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="highlight-grid">
  <div class="hl-box hl-blue"><div class="hl-icon">😴</div><div class="hl-title">1st Law — Inertia</div><div class="hl-body">"An object at rest stays at rest; in motion stays in motion — unless acted on by an external force."<br><em>Inertia ∝ Mass</em></div></div>
  <div class="hl-box hl-green"><div class="hl-icon">📐</div><div class="hl-title">2nd Law — F = ma</div><div class="hl-body">Force = Mass × Acceleration<br>Greater force → greater acceleration<br>Greater mass → less acceleration</div></div>
  <div class="hl-box hl-purple"><div class="hl-icon">🎱</div><div class="hl-title">3rd Law — Action-Reaction</div><div class="hl-body">"Every action has an equal and opposite reaction."<br>Forces act on DIFFERENT objects.</div></div>
</div>
</div></div>
<div class="formula-strip">
  <div class="formula-card"><div class="fc-label">Newton's 2nd Law</div><div class="fc-expr">F = ma</div><div class="fc-desc">Force (N) = Mass (kg) × Acceleration (m/s²)</div></div>
  <div class="formula-card"><div class="fc-label">Momentum</div><div class="fc-expr">p = mv</div><div class="fc-desc">Momentum = Mass × Velocity. Unit: kg·m/s</div></div>
  <div class="formula-card"><div class="fc-label">Conservation</div><div class="fc-expr">p₁ + p₂ = p₁' + p₂'</div><div class="fc-desc">Total momentum before = after collision</div></div>

      {id:"s10",num:10,name:"Gravitation",diff:"hard",imp:true,
       visual:`
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>🌍 Universal Law of Gravitation</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="formula-strip">
  <div class="formula-card"><div class="fc-label">Newton's Law</div><div class="fc-expr">F = G(m₁m₂)/r²</div><div class="fc-desc">Every mass attracts every other mass</div></div>
  <div class="formula-card"><div class="fc-label">G (Gravitational Constant)</div><div class="fc-expr">6.67 × 10⁻¹¹ N·m²/kg²</div><div class="fc-desc">Universal constant</div></div>
</div>
<div class="highlight-grid">
  <div class="hl-box hl-blue"><div class="hl-icon">🌍</div><div class="hl-title">Force is:</div><div class="hl-body">• Always attractive<br>• Proportional to product of masses<br>• Inversely proportional to square of distance</div></div>
  <div class="hl-box hl-yellow"><div class="hl-icon">📏</div><div class="hl-title">Action at a distance</div><div class="hl-body">Gravity acts even through vacuum — no medium needed!</div></div>
</div>
</div></div>
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>📐 g — Acceleration due to Gravity</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="formula-strip">
  <div class="formula-card"><div class="fc-label">Value of g on Earth</div><div class="fc-expr">g = 9.8 m/s² ≈ 10 m/s²</div><div class="fc-desc">Varies slightly with location</div></div>
  <div class="formula-card"><div class="fc-label">Formula for g</div><div class="fc-expr">g = GM/R²</div><div class="fc-desc">G=constant, M=mass of Earth, R=radius</div></div>
  <div class="formula-card"><div class="fc-label">Weight</div><div class="fc-expr">W = mg</div><div class="fc-desc">Weight = mass × acceleration due to gravity</div></div>
</div>
</div></div>
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>🌊 Floatation — Archimedes' Principle</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="highlight-grid">
  <div class="hl-box hl-green"><div class="hl-icon">⚓</div><div class="hl-title">Archimedes' Principle</div><div class="hl-body">When a body is immersed fully or partially in a fluid, it experiences an upward force equal to the weight of the fluid displaced.</div></div>
  <div class="hl-box hl-blue"><div class="hl-icon">📊</div><div class="hl-title">Buoyant Force</div><div class="hl-body">F = Vρg<br>V=volume displaced, ρ=density of fluid, g=acceleration</div></div>
</div>

  <tr><td>Density of object > Density of liquid</td><td>Object sinks</td></tr>
  <tr><td>Density of object = Density of liquid</td><td>Object stays suspended</td></tr>
</table></div>
</div></div>`,

      {id:"s11",num:11,name:"Work and Energy",diff:"medium",imp:true,
       visual:`
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>⚡ Work — When is work done?</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="formula-strip">
  <div class="formula-card"><div class="fc-label">Work Formula</div><div class="fc-expr">W = F × s × cos θ</div><div class="fc-desc">Work = Force × displacement × cos(angle)</div></div>
  <div class="formula-card"><div class="fc-label">Unit of Work</div><div class="fc-expr">Joule (J) = N·m</div><div class="fc-desc">1 J = 1 Newton × 1 meter</div></div>
</div>
<div class="highlight-grid">
  <div class="hl-box hl-yellow"><div class="hl-icon">✅</div><div class="hl-title">Work is DONE when:</div><div class="hl-body">• Force is applied<br>• Displacement occurs<br>• Force has component in direction of displacement</div></div>
  <div class="hl-box hl-red"><div class="hl-icon">❌</div><div class="hl-title">NO Work when:</div><div class="hl-body">• No displacement (pushing a wall)<br>• Force ⊥ to displacement (carrying horizontally)<br>• No force applied</div></div>
</div>
</div></div>
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>🔋 Types of Energy</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="highlight-grid">
  <div class="hl-box hl-blue"><div class="hl-icon">🏃</div><div class="hl-title">Kinetic Energy</div><div class="hl-body">Energy of motion<br>KE = ½mv²</div></div>
  <div class="hl-box hl-green"><div class="hl-icon">⛰️</div><div class="hl-title">Potential Energy</div><div class="hl-body">Energy due to position<br>PE = mgh</div></div>
  <div class="hl-box hl-purple"><div class="hl-icon">🌀</div><div class="hl-title">Mechanical Energy</div><div class="hl-body">ME = KE + PE</div></div>
</div>
</div></div>
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>⚖️ Law of Conservation of Energy</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="highlight-grid">
  <div class="hl-box hl-green"><div class="hl-icon">🔑</div><div class="hl-title">Conservation Law</div><div class="hl-body">Energy can neither be created nor destroyed, only transformed from one form to another. Total energy remains constant.</div></div>
</div>
<div class="sticky sticky-yellow" style="margin-top:1rem">
  Example: A ball falling — PE decreases, KE increases, but PE + KE = constant (ignoring air resistance)
</div>
</div></div>
<div class="formula-strip">
  <div class="formula-card"><div class="fc-label">Power</div><div class="fc-expr">P = W/t</div><div class="fc-desc">Power = Work / Time. Unit: Watt (W)</div></div>
  <div class="formula-card"><div class="fc-label">Commercial Unit</div><div class="fc-expr">1 kWh = 3.6 × 10⁶ J</div><div class="fc-desc">Kilowatt-hour = "unit" of electricity</div></div>
</div>`,

      {id:"h2",num:2,name:"Socialism in Europe and Russian Revolution",diff:"medium",imp:true,
       visual:`
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>📚 Socialism — Key Ideas</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="highlight-grid">
  <div class="hl-box hl-red"><div class="hl-icon">⚙️</div><div class="hl-title">Means of Production</div><div class="hl-body">Socialists believed land, factories, mines should be owned collectively (society/government), not by private individuals.</div></div>

      {id:"c1",num:1,name:"What is Democracy? Why Democracy?",diff:"easy",imp:true,
       visual:`
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>🏛️ What is Democracy?</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="highlight-grid">
  <div class="hl-box hl-blue"><div class="hl-icon">🗳️</div><div class="hl-title">Definition</div><div class="hl-body">Rule by the people. Government elected by and accountable to the people.</div></div>
  <div class="hl-box hl-green"><div class="hl-icon">✅</div><div class="hl-title">Key Features</div><div class="hl-body">• Free & fair elections<br>• Universal adult franchise<br>• Rule of law<br>• Fundamental rights<br>• Multi-party system</div></div>
</div>
</div></div>
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>⚖️ Arguments FOR Democracy</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="highlight-grid">
  <div class="hl-box hl-green"><div class="hl-icon">👥</div><div class="hl-title">1. Better Governance</div><div class="hl-body">More accountable, responsive to people's needs.</div></div>
  <div class="hl-box hl-blue"><div class="hl-icon">⚖️</div><div class="hl-title">2. Equality & Dignity</div><div class="hl-body">Treats all citizens equally. Respects individual dignity.</div></div>
  <div class="hl-box hl-yellow"><div class="hl-icon">🧠</div><div class="hl-title">3. Improves Decision Making</div><div class="hl-body">More heads = better decisions. Room for correction.</div></div>
  <div class="hl-box hl-purple"><div class="hl-icon">🕊️</div><div class="hl-title">4. Peaceful Change</div><div class="hl-body">Change through elections, not violence.</div></div>
</div>
</div></div>
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>⚠️ Arguments AGAINST Democracy</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="highlight-grid">
  <div class="hl-box hl-red"><div class="hl-icon">🐌</div><div class="hl-title">1. Slow Decision Making</div><div class="hl-body">Consultations, debates take time.</div></div>
  <div class="hl-box hl-orange"><div class="hl-icon">🙈</div><div class="hl-title">2. Leaders May Ignore People</div><div class="hl-body">Elected leaders may not represent people's interests.</div></div>
  <div class="hl-box hl-yellow"><div class="hl-icon">🗣️</div><div class="hl-title">3. Corruption & Competition</div><div class="hl-body">Electoral competition can lead to corruption.</div></div>
</div>
</div></div>
<div class="highlight-grid">
  <div class="hl-box hl-green"><div class="hl-icon">⭐</div><div class="hl-title">Conclusion</div><div class="hl-body">Democracy is the best available form of government despite its flaws. "Democracy is better than its alternatives."</div></div>
</div>`,

<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>📜 What is a Constitution?</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="highlight-grid">
  <div class="hl-box hl-blue"><div class="hl-icon">📖</div><div class="hl-title">Definition</div><div class="hl-body">Supreme law of the land. Sets out framework for government, rights of citizens, and relationship between them.</div></div>
  <div class="hl-box hl-green"><div class="hl-icon">🎯</div><div class="hl-title">Functions</div><div class="hl-body">• Generates trust & coordination<br>• Specifies power allocation<br>• Limits government power<br>• Rights of citizens</div></div>
</div>
</div></div>
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>🇮🇳 Making of Indian Constitution</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="highlight-grid">
  <div class="hl-box hl-yellow"><div class="hl-icon">📅</div><div class="hl-title">Timeline</div><div class="hl-body">Constituent Assembly formed: Dec 1946<br>Work completed: Nov 1949<br>Came into force: Jan 26, 1950</div></div>
  <div class="hl-box hl-purple"><div class="hl-icon">👤</div><div class="hl-title">Dr. B.R. Ambedkar</div><div class="hl-body">Chairman of Drafting Committee. "Father of Indian Constitution."</div></div>
  <div class="hl-box hl-blue"><div class="hl-icon">📊</div><div class="hl-title">Features</div><div class="hl-body">• Lengthiest written constitution<br>• Blend of rigidity & flexibility<br>• Borrowed from various sources</div></div>
</div>
</div></div>
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>📋 Key Features of Indian Constitution</h3><button class="sb-toggle">▼</button></div><div class="sb-body">

  <tr><td>Parliamentary Form</td><td>PM & Council of Ministers accountable to Lok Sabha</td></tr>
  <tr><td>Separation of Powers</td><td>Legislature, Executive, Judiciary independent</td></tr>
  <tr><td>Fundamental Rights</td><td>6 rights guaranteed to all citizens (Part III)</td></tr>
  <tr><td>Secularism</td><td>No state religion, all religions equal</td></tr>
  <tr><td>Universal Adult Franchise</td><td>All adults (18+) can vote</td></tr>

</div></div>
<div class="highlight-grid">

</div>`,

      {id:"c5",num:5,name:"Democratic Rights",diff:"easy",imp:true,
       visual:`
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>📜 Fundamental Rights (Part III)</h3><button class="sb-toggle">▼</button></div><div class="sb-body">
<div class="highlight-grid">
  <div class="hl-box hl-red"><div class="hl-icon">🛡️</div><div class="hl-title">Right to Equality</div><div class="hl-body">Articles 14-18. Equality before law. No discrimination. Abolition of untouchability.</div></div>

  <div class="hl-box hl-green"><div class="hl-icon">🛡️</div><div class="hl-title">Right against Exploitation</div><div class="hl-body">Articles 23-24. No forced labor. No child labor (<14 years in hazardous work).</div></div>
  <div class="hl-box hl-yellow"><div class="hl-icon">🙏</div><div class="hl-title">Right to Freedom of Religion</div><div class="hl-body">Articles 25-28. Freedom of conscience, practice, propagate religion.</div></div>
  <div class="hl-box hl-purple"><div class="hl-icon">📚</div><div class="hl-title">Cultural & Educational Rights</div><div class="hl-body">Articles 29-30. Protect minorities' language, culture. Right to establish institutions.</div></div>
  <div class="hl-box hl-orange"><div class="hl-icon">⚖️</div><div class="hl-title">Right to Constitutional Remedies</div><div class="hl-body">Article 32. Move Supreme Court for enforcement of rights. "Heart & Soul of Constitution."</div></div>
</div>
</div></div>
<div class="section-block"><div class="sb-header" onclick="toggleBlock(this)"><h3>⚖️ Writs (Article 32)</h3><button class="sb-toggle">▼</button></div><div class="sb-body">

  <tr><td>Mandamus</td><td>Command to perform public duty</td></tr>
  <tr><td>Prohibition</td><td>Stop lower court from exceeding jurisdiction</td></tr>
  <tr><td>Certiorari</td><td>Transfer case to higher court/quash order</td></tr>
  <tr><td>Quo Warranto</td><td>Question authority to hold public office</td></tr>
</table></div>

/* ═══════════════════════════════════════
   PROGRESS TRACKING SYSTEM
═══════════════════════════════════════ */
const PROGRESS_KEY = 'studynova_progress';
const CHAPTER_COMPLETION_KEY = 'studynova_completed_chapters';

// Initialize progress data
function getProgressData() {
  const data = localStorage.getItem(PROGRESS_KEY);
  return data ? JSON.parse(data) : {};
}

function getCompletedChapters() {
  const data = localStorage.getItem(CHAPTER_COMPLETION_KEY);
  return data ? JSON.parse(data) : [];
}

function saveProgressData(data) {
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(data));
}

function saveCompletedChapters(chapters) {
  localStorage.setItem(CHAPTER_COMPLETION_KEY, JSON.stringify(chapters));
}

function getChapterProgress(chapterId) {
  const progressData = getProgressData();
  return progressData[chapterId] || { quizScore: 0, quizTotal: 0, flashcardsViewed: 0, completed: false };
}

function updateChapterProgress(chapterId, updates) {
  const progressData = getProgressData();
  progressData[chapterId] = { ...getChapterProgress(chapterId), ...updates };
  saveProgressData(progressData);
  renderSidebar(); // Update sidebar progress bars
}

function markChapterComplete(chapterId) {
  const completed = getCompletedChapters();
  if (!completed.includes(chapterId)) {
    completed.push(chapterId);
    saveCompletedChapters(completed);
  }
  updateChapterProgress(chapterId, { completed: true });
}

function isChapterCompleted(chapterId) {
  return getCompletedChapters().includes(chapterId);
}

function calculateMasteryPercentage(chapterId) {
  const progress = getChapterProgress(chapterId);
  const chapter = findChapterById(chapterId);
  if (!chapter) return 0;
  
  let score = 0;
  let total = 0;
  
  // Quiz score (40% weight)
  if (chapter.mcqs && chapter.mcqs.length > 0) {
    const quizPercent = progress.quizTotal > 0 ? (progress.quizScore / progress.quizTotal) * 100 : 0;
    score += quizPercent * 0.4;
    total += 40;
  }
  
  // Flashcards viewed (30% weight)
  if (chapter.flashcards && chapter.flashcards.length > 0) {
    const cardPercent = Math.min((progress.flashcardsViewed / chapter.flashcards.length) * 100, 100);
    score += cardPercent * 0.3;
    total += 30;
  }
  
  // Completion status (30% weight)
  if (progress.completed) {
    score += 30;
  }
  total += 30;
  
  return Math.round((score / total) * 100);
}

function findChapterById(chapterId) {
  for (const subject of Object.values(DATA)) {
    const chapter = subject.chapters.find(ch => ch.id === chapterId);
    if (chapter) return chapter;
  }
  return null;
}

function getOverallProgress() {
  let totalChapters = 0;
  let completedChapters = 0;
  let totalMastery = 0;
  
  for (const subject of Object.values(DATA)) {
    for (const chapter of subject.chapters) {
      totalChapters++;
      if (isChapterCompleted(chapter.id)) {
        completedChapters++;
      }
      totalMastery += calculateMasteryPercentage(chapter.id);
    }
  }
  
  return {
    totalChapters,
    completedChapters,
    averageMastery: totalChapters > 0 ? Math.round(totalMastery / totalChapters) : 0
  };
}

/* ── LOAD CHAPTER ── */
function loadChapter(subjKey, chId){
  const subj = DATA[subjKey];
  const ch = subj.chapters.find(c=>c.id===chId);
  if(!ch) return;
  currentChapter = ch;
  currentSubjectKey = subjKey;
  currentView = 'visual';
  currentQuizScore = 0;
  currentQuizTotal = 0;
  quizAnswered = [];

  // Update nav active state
  document.querySelectorAll('.ch-item').forEach(e=>e.classList.remove('active'));
  const navEl = document.getElementById('nav-'+chId);
  if(navEl){ navEl.classList.add('active'); }

  document.getElementById('welcome').style.display='none';
  document.getElementById('chapter-view').style.display='block';
  document.getElementById('view-toggles').style.display='flex';

  // Update breadcrumb
  document.getElementById('breadcrumb').innerHTML=`${subj.icon} ${subj.name} <span>/ ${ch.name}</span>`;

  // Reset view buttons
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.view-btn').classList.add('active');

  renderChapterView();

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('mobile-open');

  // Scroll to top
  window.scrollTo(0,0);
}

function renderChapterView(){
  const ch = currentChapter;
  const subj = DATA[currentSubjectKey];
  const diffLabel = {easy:'Easy ✅',medium:'Medium 🟡',hard:'Hard 🔴'}[ch.diff];
  const diffClass = {easy:'difficulty-easy',medium:'difficulty-medium',hard:'difficulty-hard'}[ch.diff];
  const mastery = calculateMasteryPercentage(ch.id);
  const isCompleted = isChapterCompleted(ch.id);

  let content = '';
  if(currentView==='visual'){
    content = ch.visual + renderPostLectureQuizPrompt();
  } else if(currentView==='flashcards'){
    content = renderFlashcards(ch);
  } else if(currentView==='quiz'){
    content = renderQuiz(ch);
  } else if(currentView==='resources'){
    content = renderResources(ch);
  } else if(currentView==='pyq'){
    content = renderPYQ(ch);
  }

  document.getElementById('chapter-view').innerHTML = `
    <div class="ch-page-header fade-in">
      <div style="font-size:.75rem;color:${subj.color};font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:.4rem">${subj.icon} ${subj.name} · Chapter ${ch.num}</div>
      <div class="ch-page-title">${ch.name}</div>
      <div class="ch-meta">
        <span class="ch-pill ${diffClass}">${diffLabel}</span>
        ${ch.imp?'<span class="ch-pill imp-pill">⭐ Important</span>':''}
        <span class="ch-pill exam-pill">📋 CBSE Class 9</span>
      </div>
      
      <!-- Chapter Progress Bar -->
      <div class="chapter-progress">
        <span class="chapter-progress-label">📊 Mastery:</span>
        <div class="chapter-progress-bar">
          <div class="chapter-progress-fill" style="width:${mastery}%"></div>
        </div>
        <span class="chapter-progress-text">${mastery}%</span>
        <button class="mark-complete-btn ${isCompleted ? 'completed' : ''}" onclick="toggleChapterComplete('${ch.id}')">
          ${isCompleted ? '✓ Completed' : 'Mark Complete'}
        </button>
      </div>
      
      <button class="ai-ask-btn" onclick="openAI('${ch.name}')">✨ Ask AI about this chapter</button>

function renderPostLectureQuizPrompt() {
  const ch = currentChapter;

  const hasTakenQuiz = progress.quizTotal > 0;
  
  return `
    <div class="post-lecture-quiz">
      <h3>🎯 Ready to Test Your Knowledge?</h3>
      <p>Take a quiz to check your understanding of this chapter and boost your mastery score!</p>
      <button class="start-quiz-btn" onclick="startPostLectureQuiz()">${hasTakenQuiz ? 'Retake Quiz' : 'Start Quiz Now'} →</button>

}

function startPostLectureQuiz() {
  currentView = 'quiz';
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.view-btn')[2].classList.add('active'); // Quiz button
  renderChapterView();
  // Scroll to quiz
  document.querySelector('.visual-mcq')?.scrollIntoView({ behavior: 'smooth' });
}

function toggleChapterComplete(chapterId) {
  if (isChapterCompleted(chapterId)) {
    // Unmark
    const completed = getCompletedChapters().filter(id => id !== chapterId);
    saveCompletedChapters(completed);
    updateChapterProgress(chapterId, { completed: false });
  } else {
    markChapterComplete(chapterId);
  }
  renderChapterView();
  renderSidebar();
}

function renderFlashcards(ch){
  const progress = getChapterProgress(ch.id);
  return `<div class="visual-flashcards">${ch.flashcards.map((fc,i)=>`
    <div class="vfc" id="vfc-${i}" onclick="flipVFC(${i}); recordFlashcardViewed('${ch.id}', ${i})">
      <div class="vfc-inner">
        <div class="vfc-face vfc-front">
          <div class="vf-label">Question ${i+1}/${ch.flashcards.length}</div>
          <div class="vf-text">${fc.q}</div>
          <div class="vf-hint">Tap to reveal answer ↻</div>
        </div>
        <div class="vfc-face vfc-back">
          <div class="vf-label">Answer</div>
          <div class="vf-text">${fc.a}</div>
        </div>
      </div>
    </div>`).join('')}</div>`;
}

function flipVFC(i){ document.getElementById('vfc-'+i).classList.toggle('flipped'); }

function recordFlashcardViewed(chapterId, cardIndex) {
  const progress = getChapterProgress(chapterId);
  if (!progress.flashcardsViewedSet) {
    progress.flashcardsViewedSet = new Set();
  }
  // Use array to track viewed cards
  if (!progress.viewedCards) progress.viewedCards = [];
  if (!progress.viewedCards.includes(cardIndex)) {
    progress.viewedCards.push(cardIndex);
    updateChapterProgress(chapterId, { 
      flashcardsViewed: progress.viewedCards.length,
      viewedCards: progress.viewedCards 
    });
  }
}

function renderQuiz(ch){
  currentQuizScore = 0;
  currentQuizTotal = ch.mcqs.length;
  quizAnswered = new Array(ch.mcqs.length).fill(false);
  
  return `<div class="visual-mcq">${ch.mcqs.map((q,qi)=>`
    <div class="vmcq-card" id="vmcq-${qi}">
      <div class="vmcq-q">Q${qi+1}. ${q.q}</div>
      <div class="vmcq-opts">
        ${q.opts.map((o,oi)=>`<button class="vmcq-opt" id="opt-${qi}-${oi}" onclick="checkQ(${qi},${oi},${q.ans},'${q.exp.replace(/'/g,"&#39;")}')">${String.fromCharCode(65+oi)}. ${o}</button>`).join('')}
      </div>
      <div class="vmcq-exp" id="vmcq-exp-${qi}"></div>
    </div>`).join('')}
    <div id="quiz-complete-section" style="display:none;margin-top:1.5rem;text-align:center">
      <button class="quiz-btn quiz-btn-primary" onclick="finishQuiz('${ch.id}')">Finish Quiz & Save Score</button>
    </div>
  </div>`;
}

function checkQ(qi,chosen,correct,exp){
  if (quizAnswered[qi]) return; // Already answered
  
  const card = document.getElementById('vmcq-'+qi);
  card.querySelectorAll('.vmcq-opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===correct) b.classList.add('correct');
    else if(i===chosen) b.classList.add('wrong');
  });
  const expEl = document.getElementById('vmcq-exp-'+qi);
  expEl.classList.add('show', chosen===correct?'ok':'bad');
  expEl.textContent = (chosen===correct?'✓ Correct! ':'✗ Wrong. ') + exp;
  
  quizAnswered[qi] = true;
  if (chosen === correct) {
    currentQuizScore++;
  }
  
  // Show finish button if all answered
  if (quizAnswered.every(a => a)) {
    document.getElementById('quiz-complete-section').style.display = 'block';
  }
}

function finishQuiz(chapterId) {
  // Save quiz score
  updateChapterProgress(chapterId, { 
    quizScore: currentQuizScore, 
    quizTotal: currentQuizTotal 
  });
  
  // Show completion modal
  const percentage = Math.round((currentQuizScore / currentQuizTotal) * 100);
  let message = '';
  if (percentage >= 80) message = 'Excellent! 🌟';
  else if (percentage >= 60) message = 'Good job! 👍';
  else if (percentage >= 40) message = 'Keep practicing! 📚';
  else message = 'Review and try again! 💪';
  
  document.getElementById('quiz-score').textContent = `${currentQuizScore}/${currentQuizTotal}`;
  document.getElementById('quiz-score-label').textContent = `${percentage}% — ${message}`;
  document.getElementById('quiz-complete-modal').classList.add('show');
  
  // Update UI
  renderChapterView();
  renderSidebar();
}

function closeQuizModal() {
  document.getElementById('quiz-complete-modal').classList.remove('show');
}

function retakeQuiz() {
  closeQuizModal();
  renderChapterView();
}

/* ── AI PANEL ── */
let aiContext = '';
function openAI(chapterName){
  aiContext = chapterName;
  document.getElementById('ai-overlay').classList.add('open');
  const msgs = document.getElementById('ai-messages');
  msgs.innerHTML = `<div class="ai-msg bot">Hi! I'm here to help you understand <strong>${chapterName}</strong>. Ask me anything — a concept, a formula, an exam tip, or a practice question! 🎓</div>`;
  document.getElementById('ai-input').focus();
}
function closeAI(){
  document.getElementById('ai-overlay').classList.remove('open');
}
async function sendAI(){
  const input = document.getElementById('ai-input');
  const q = input.value.trim();
  if(!q) return;
  input.value = '';
  const msgs = document.getElementById('ai-messages');
  msgs.innerHTML += `<div class="ai-msg user">${q}</div>`;
  msgs.innerHTML += `<div class="ai-msg loading" id="ai-loading">Thinking…</div>`;
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        system:`You are a friendly, expert Class 9 CBSE tutor. The student is asking about "${aiContext}". Give clear, visual, concise answers. Use bullet points, emojis, and simple language. If asked for a formula, show it clearly. Keep answers under 200 words unless asked for detail.`,
        messages:[{role:"user",content:q}]
      })
    });
    const data = await response.json();
    const text = data.content?.map(c=>c.text||'').join('') || "Sorry, I couldn't get an answer right now.";
    document.getElementById('ai-loading').remove();
    msgs.innerHTML += `<div class="ai-msg bot">${text.replace(/\n/g,'<br>')}</div>`;
    msgs.scrollTop = msgs.scrollHeight;
  } catch(e) {
    document.getElementById('ai-loading').textContent = "Connection error. Please try again.";
  }
}

// Close AI on overlay click
document.addEventListener('click', function(e) {
  const overlay = document.getElementById('ai-overlay');
  if (e.target === overlay) closeAI();
});

// Enter key for AI input
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('ai-input') === document.activeElement) {
    sendAI();
  }
});

renderWelcome();

document.getElementById('subj-math').classList.add('open');
</script>
