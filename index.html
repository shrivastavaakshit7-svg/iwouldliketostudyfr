<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akshit OS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{
--glass:rgba(255,255,255,0.18);
--glass2:rgba(255,255,255,0.28);
--glass3:rgba(255,255,255,0.08);
--shadow:0 8px 32px rgba(0,0,0,0.25);
--radius:18px;
--radius-lg:24px;
--accent:#6c5ce7;
--accent2:#a29bfe;
--text:#fff;
--text2:rgba(255,255,255,0.7);
--dock-bg:rgba(255,255,255,0.15);
--titlebar:rgba(0,0,0,0.25);
}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;user-select:none}
#desktop{width:100%;height:100%;position:relative}
#wallpaper-bg{position:absolute;inset:0;z-index:0;transition:all 0.8s ease;background-size:cover;background-position:center;background-repeat:no-repeat}
.gradient-1{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e)!important}
.gradient-2{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460,#533483)!important}
.gradient-3{background:linear-gradient(135deg,#0d1b2a,#1b263b,#415a77,#778da9)!important}
.gradient-4{background:linear-gradient(135deg,#2d1b69,#11998e)!important}
.gradient-5{background:linear-gradient(135deg,#0c0c1d,#1a1a40,#3a0ca3,#7209b7)!important}
.gradient-6{background:linear-gradient(135deg,#141e30,#243b55)!important}
.gradient-7{background:linear-gradient(135deg,#1e3c72,#2a5298)!important}
.gradient-8{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364)!important}

#menubar{position:absolute;top:0;left:0;right:0;height:32px;background:rgba(0,0,0,0.45);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:10000;color:#fff;font-size:13px;font-weight:500;transition:transform 0.35s cubic-bezier(0.4,0,0.2,1),opacity 0.35s ease}
#menubar.hidden{transform:translateY(-100%);opacity:0;pointer-events:none}
#menubar-left{display:flex;align-items:center;gap:18px}
#menubar-left span:first-child{font-size:16px}
#menubar-right{display:flex;align-items:center;gap:16px}
#clock{font-weight:600;font-size:13px;font-variant-numeric:tabular-nums;min-width:75px;text-align:right;letter-spacing:0.5px}
#menu-date{font-size:12px;color:rgba(255,255,255,0.85);font-variant-numeric:tabular-nums}

#dock{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;padding:8px 14px;background:var(--dock-bg);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);border-radius:22px;border:1px solid rgba(255,255,255,0.15);z-index:9999;transition:all 0.35s cubic-bezier(0.4,0,0.2,1)}
#dock.hidden{transform:translateX(-50%) translateY(120%);opacity:0;pointer-events:none}
.dock-item{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);position:relative;background:rgba(255,255,255,0.05)}
.dock-item:hover{transform:scale(1.35) translateY(-10px);background:rgba(255,255,255,0.12)}
.dock-item.active::after{content:'';position:absolute;bottom:-4px;width:5px;height:5px;border-radius:50%;background:#fff}
.dock-tooltip{position:absolute;top:-35px;background:rgba(0,0,0,0.75);color:#fff;padding:4px 10px;border-radius:8px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.2s}
.dock-item:hover .dock-tooltip{opacity:1}

.window{position:absolute;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow),0 0 0 1px rgba(255,255,255,0.08);display:flex;flex-direction:column;min-width:380px;min-height:280px;backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.1);transition:border-radius 0.3s ease}
.window.maximized{border-radius:0!important}
.window.opening{animation:windowOpen 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards}
.window.closing{animation:windowClose 0.25s ease forwards}
.window.minimizing{animation:windowMinimize 0.35s ease forwards}
@keyframes windowOpen{0%{transform:scale(0.8);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes windowClose{0%{transform:scale(1);opacity:1}100%{transform:scale(0.8);opacity:0}}
@keyframes windowMinimize{0%{transform:scale(1) translateY(0);opacity:1}100%{transform:scale(0.4) translateY(300px);opacity:0}}
.window-bg{position:absolute;inset:0;background:rgba(30,30,40,0.82);z-index:0}
.titlebar{height:42px;display:flex;align-items:center;padding:0 14px;position:relative;z-index:1;cursor:default;background:var(--titlebar);backdrop-filter:blur(10px);flex-shrink:0}
.titlebar-btns{display:flex;gap:8px;align-items:center}
.titlebar-btn{width:13px;height:13px;border-radius:50%;cursor:pointer;transition:all 0.15s;border:none;outline:none}
.btn-close{background:#ff5f57}.btn-close:hover{background:#ff3b30}
.btn-min{background:#ffbd2e}.btn-min:hover{background:#f5a623}
.btn-max{background:#28c840}.btn-max:hover{background:#1db954}
.titlebar-title{position:absolute;left:50%;transform:translateX(-50%);font-size:13px;font-weight:600;color:rgba(255,255,255,0.85);pointer-events:none}
.window-body{flex:1;position:relative;z-index:1;overflow:auto;color:var(--text);display:flex;flex-direction:column}
.window-body::-webkit-scrollbar{width:6px}
.window-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:10px}
.focused{z-index:1000!important}

.tab-bar{display:flex;align-items:center;background:rgba(0,0,0,0.2);padding:4px 8px;gap:4px;overflow-x:auto;position:relative;z-index:1;flex-shrink:0}
.tab-bar::-webkit-scrollbar{height:0}
.tab{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:12px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.2s;white-space:nowrap;max-width:180px}
.tab.active{background:rgba(255,255,255,0.12);color:#fff}
.tab:hover{background:rgba(255,255,255,0.08)}
.tab-close{font-size:10px;opacity:0.5;cursor:pointer;margin-left:4px;padding:2px 4px;border-radius:4px}
.tab-close:hover{opacity:1;background:rgba(255,255,255,0.15)}
.tab-add{padding:6px 10px;border-radius:12px;font-size:14px;color:var(--text2);cursor:pointer;transition:all 0.2s}
.tab-add:hover{background:rgba(255,255,255,0.08);color:#fff}

.browser-toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(0,0,0,0.15);position:relative;z-index:1;flex-shrink:0}
.browser-url{flex:1;padding:8px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#fff;font-size:13px;outline:none;transition:all 0.2s}
.browser-url:focus{border-color:var(--accent);background:rgba(255,255,255,0.1)}
.browser-nav{padding:6px 10px;border-radius:10px;border:none;background:rgba(255,255,255,0.06);color:#fff;cursor:pointer;font-size:14px;transition:all 0.2s}
.browser-nav:hover{background:rgba(255,255,255,0.12)}
.browser-frame-container{flex:1;position:relative;overflow:hidden}
.browser-frame-container iframe{width:100%;height:100%;border:none;background:#fff}
.browser-home-page{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px;overflow-y:auto}
.browser-home-page h2{font-size:22px;font-weight:700;color:#fff}
.browser-home-page p{font-size:13px;color:var(--text2)}
.search-box{display:flex;gap:8px;width:100%;max-width:500px}
.search-box input{flex:1;padding:12px 18px;border-radius:16px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);color:#fff;font-size:14px;outline:none;transition:all 0.2s}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 20px rgba(108,92,231,0.2)}
.search-box button{padding:12px 20px;border-radius:16px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;transition:all 0.2s}
.search-box button:hover{background:var(--accent2)}
.search-history{margin-top:20px;width:100%;max-width:500px}
.search-history h4{font-size:12px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.history-item{padding:8px 14px;border-radius:12px;background:rgba(255,255,255,0.04);margin-bottom:4px;font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px}
.history-item:hover{background:rgba(255,255,255,0.08);color:#fff}
.history-delete{margin-left:auto;opacity:0;font-size:10px;padding:2px 6px;border-radius:6px;cursor:pointer}
.history-item:hover .history-delete{opacity:0.6}
.history-delete:hover{opacity:1!important;background:rgba(255,95,87,0.2)}
.quick-links{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:500px;margin-top:10px}
.quick-link{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 10px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:all 0.2s;font-size:24px}
.quick-link:hover{background:rgba(255,255,255,0.08);transform:scale(1.05)}
.quick-link span{font-size:11px;color:var(--text2)}
.browser-blocked{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px;text-align:center;background:rgba(30,30,40,0.98)}
.browser-blocked .blocked-icon{font-size:56px;margin-bottom:4px}
.browser-blocked h3{font-size:18px;color:#fff;font-weight:600}
.browser-blocked p{font-size:13px;color:var(--text2);max-width:440px;line-height:1.7}
.browser-blocked .blocked-url{font-size:12px;color:var(--accent2);background:rgba(108,92,231,0.1);padding:8px 16px;border-radius:12px;word-break:break-all;max-width:400px;margin:4px 0}
.browser-blocked .blocked-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.browser-blocked .blocked-actions button{padding:10px 24px;border-radius:14px;border:none;cursor:pointer;font-weight:600;font-size:13px;transition:all 0.2s}
.blocked-btn-primary{background:var(--accent);color:#fff}
.blocked-btn-primary:hover{background:var(--accent2)}
.blocked-btn-secondary{background:rgba(255,255,255,0.08);color:#fff}
.blocked-btn-secondary:hover{background:rgba(255,255,255,0.15)}
.blocked-tip{margin-top:12px;padding:16px 20px;border-radius:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);text-align:left;max-width:440px;width:100%}
.blocked-tip h4{font-size:12px;color:var(--accent2);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.blocked-tip ul{list-style:none;font-size:12px;color:var(--text2);line-height:2}
.blocked-tip ul li::before{content:'✓ ';color:var(--accent2)}

.calc-display{padding:20px;text-align:right;font-size:36px;font-weight:300;color:#fff;background:rgba(0,0,0,0.2);min-height:80px;display:flex;flex-direction:column;justify-content:flex-end;border-radius:0 0 16px 16px;margin:0 8px}
.calc-expr{font-size:14px;color:var(--text2);margin-bottom:4px}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px}
.calc-btn{padding:16px;border-radius:14px;border:none;font-size:18px;font-weight:500;cursor:pointer;transition:all 0.15s;color:#fff}
.calc-btn:active{transform:scale(0.93)}
.calc-btn.num{background:rgba(255,255,255,0.08)}
.calc-btn.num:hover{background:rgba(255,255,255,0.15)}
.calc-btn.op{background:rgba(108,92,231,0.3);color:var(--accent2)}
.calc-btn.op:hover{background:rgba(108,92,231,0.45)}
.calc-btn.fn{background:rgba(255,255,255,0.04);color:var(--text2)}
.calc-btn.fn:hover{background:rgba(255,255,255,0.1)}
.calc-btn.eq{background:var(--accent);color:#fff}
.calc-btn.eq:hover{background:var(--accent2)}

.timer-container{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;gap:20px;height:100%}
.timer-display{font-size:64px;font-weight:200;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:2px}
.timer-controls{display:flex;gap:10px}
.timer-btn{padding:10px 24px;border-radius:14px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;color:#fff}
.timer-btn.start{background:rgba(40,200,64,0.3);color:#28c840}
.timer-btn.start:hover{background:rgba(40,200,64,0.45)}
.timer-btn.pause{background:rgba(255,189,46,0.3);color:#ffbd2e}
.timer-btn.pause:hover{background:rgba(255,189,46,0.45)}
.timer-btn.reset{background:rgba(255,95,87,0.3);color:#ff5f57}
.timer-btn.reset:hover{background:rgba(255,95,87,0.45)}
.timer-presets{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.preset-btn{padding:8px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--text2);font-size:12px;cursor:pointer;transition:all 0.2s}
.preset-btn:hover{background:rgba(255,255,255,0.1);color:#fff;border-color:var(--accent)}
.timer-tabs{display:flex;gap:4px;background:rgba(0,0,0,0.2);padding:4px;border-radius:14px}
.timer-tab{padding:8px 16px;border-radius:12px;font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.2s}
.timer-tab.active{background:rgba(255,255,255,0.1);color:#fff}

.notes-sidebar{width:200px;background:rgba(0,0,0,0.15);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;flex-shrink:0}
.notes-list{flex:1;overflow-y:auto;padding:6px}
.note-item{padding:10px 12px;border-radius:12px;cursor:pointer;transition:all 0.2s;margin-bottom:2px}
.note-item:hover{background:rgba(255,255,255,0.06)}
.note-item.active{background:rgba(108,92,231,0.2)}
.note-item-title{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-item-preview{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notes-editor{flex:1;display:flex;flex-direction:column}
.notes-editor textarea{flex:1;background:transparent;border:none;color:#fff;font-size:14px;line-height:1.7;padding:20px;resize:none;outline:none;font-family:inherit}
.notes-toolbar{padding:8px 12px;display:flex;gap:6px;border-bottom:1px solid rgba(255,255,255,0.06)}
.notes-toolbar button{padding:6px 12px;border-radius:10px;border:none;background:rgba(255,255,255,0.06);color:var(--text2);font-size:12px;cursor:pointer;transition:all 0.2s}
.notes-toolbar button:hover{background:rgba(255,255,255,0.12);color:#fff}

.todo-container{padding:16px;display:flex;flex-direction:column;gap:12px;height:100%}
.todo-input-row{display:flex;gap:8px}
.todo-input{flex:1;padding:10px 16px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#fff;font-size:13px;outline:none;transition:all 0.2s}
.todo-input:focus{border-color:var(--accent)}
.todo-add-btn{padding:10px 18px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:13px;transition:all 0.2s}
.todo-add-btn:hover{background:var(--accent2)}
.todo-filters{display:flex;gap:4px}
.todo-filter{padding:6px 14px;border-radius:10px;font-size:12px;border:none;background:rgba(255,255,255,0.04);color:var(--text2);cursor:pointer;transition:all 0.2s}
.todo-filter.active{background:rgba(108,92,231,0.2);color:var(--accent2)}
.todo-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.todo-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;background:rgba(255,255,255,0.04);transition:all 0.2s;cursor:pointer}
.todo-item:hover{background:rgba(255,255,255,0.07)}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--text2)}
.todo-check{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 0.2s;flex-shrink:0}
.todo-item.done .todo-check{background:var(--accent);border-color:var(--accent)}
.todo-text{flex:1;font-size:13px}
.todo-priority{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600}
.priority-high{background:rgba(255,95,87,0.2);color:#ff5f57}
.priority-med{background:rgba(255,189,46,0.2);color:#ffbd2e}
.priority-low{background:rgba(40,200,64,0.2);color:#28c840}
.todo-delete{opacity:0;font-size:14px;cursor:pointer;transition:all 0.2s;color:var(--text2)}
.todo-item:hover .todo-delete{opacity:1}

.pomo-container{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:20px}
.pomo-ring{width:200px;height:200px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center}
.pomo-ring svg{position:absolute;width:100%;height:100%;transform:rotate(-90deg)}
.pomo-ring circle{fill:none;stroke-width:4}
.pomo-ring .bg{stroke:rgba(255,255,255,0.06)}
.pomo-ring .progress{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.pomo-time{font-size:48px;font-weight:200;color:#fff;font-variant-numeric:tabular-nums}
.pomo-label{font-size:13px;color:var(--text2)}
.pomo-modes{display:flex;gap:4px;background:rgba(0,0,0,0.2);padding:4px;border-radius:14px}
.pomo-mode{padding:8px 16px;border-radius:12px;font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.2s;border:none;background:transparent}
.pomo-mode.active{background:rgba(255,255,255,0.1);color:#fff}

.flash-container{display:flex;flex-direction:column;height:100%;padding:16px;gap:12px}
.flash-deck-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.flash-deck{padding:6px 14px;border-radius:12px;font-size:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--text2);cursor:pointer;transition:all 0.2s}
.flash-deck.active{background:rgba(108,92,231,0.2);color:var(--accent2);border-color:var(--accent)}
.flash-card-area{flex:1;display:flex;align-items:center;justify-content:center;perspective:1000px}
.flash-card{width:340px;height:220px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform 0.6s cubic-bezier(0.34,1.56,0.64,1)}
.flash-card.flipped{transform:rotateY(180deg)}
.flash-face{position:absolute;inset:0;border-radius:20px;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;backface-visibility:hidden;font-size:18px;line-height:1.5}
.flash-front{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1)}
.flash-back{background:rgba(108,92,231,0.15);border:1px solid rgba(108,92,231,0.2);transform:rotateY(180deg)}
.flash-nav{display:flex;gap:10px;align-items:center;justify-content:center}
.flash-nav button{padding:8px 20px;border-radius:12px;border:none;background:rgba(255,255,255,0.06);color:#fff;cursor:pointer;transition:all 0.2s;font-size:13px}
.flash-nav button:hover{background:rgba(255,255,255,0.12)}
.flash-counter{font-size:12px;color:var(--text2)}
.flash-add{display:flex;gap:6px}
.flash-add input{flex:1;padding:8px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#fff;font-size:12px;outline:none}
.flash-add input:focus{border-color:var(--accent)}

.settings-container{padding:24px;display:flex;flex-direction:column;gap:24px;overflow-y:auto}
.settings-section{display:flex;flex-direction:column;gap:10px}
.settings-section h3{font-size:14px;font-weight:600;color:#fff}
.settings-section p{font-size:12px;color:var(--text2)}
.wallpaper-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.wallpaper-option{aspect-ratio:16/10;border-radius:14px;cursor:pointer;transition:all 0.2s;border:3px solid transparent;position:relative;overflow:hidden;background-size:cover;background-position:center}
.wallpaper-option:hover{transform:scale(1.05);border-color:rgba(255,255,255,0.3)}
.wallpaper-option.active{border-color:var(--accent);box-shadow:0 0 20px rgba(108,92,231,0.3)}
.wallpaper-option::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;background:rgba(0,0,0,0.3);opacity:0;transition:all 0.2s;border-radius:11px}
.wallpaper-option.active::after{opacity:1}
.custom-wp-area{display:flex;flex-direction:column;gap:10px}

<script>
// Sites known to block iframe embedding via X-Frame-Options / CSP
const BLOCKED_SITES=[
'youtube.com','youtu.be','google.com/search','facebook.com','instagram.com',
'twitter.com','x.com','github.com','reddit.com','linkedin.com','netflix.com',
'amazon.com','twitch.tv','discord.com','tiktok.com','pinterest.com',
'stackoverflow.com','medium.com','apple.com','microsoft.com','outlook.com',
'mail.google.com','drive.google.com','maps.google.com','play.google.com',
'accounts.google.com','login.','signin','auth.','oauth','spotify.com',
'whatsapp.com','telegram.org','slack.com','zoom.us','dropbox.com',
'paypal.com','stripe.com','bank','chase.com','wellsfargo.com'
];

// Sites known to work in iframes
const SAFE_EMBED_SITES=[
'wikipedia.org','wikimedia.org','wolframalpha.com','desmos.com',
'khanacademy.org','archive.org','codepen.io','jsfiddle.net',
'codesandbox.io','openstreetmap.org','developer.mozilla.org',
'w3schools.com','httpbin.org','example.com','itch.io'
];

function isLikelyBlocked(url){
try{
const hostname=new URL(url).hostname.toLowerCase();
const fullUrl=url.toLowerCase();
for(const b of BLOCKED_SITES){
if(hostname.includes(b)||fullUrl.includes(b))return true;
}
return false;
}catch(e){return false}
}

function getProxiedSearchUrl(query){
return 'https://www.google.com/search?igu=1&q='+encodeURIComponent(query);
}

function getAlternativeUrl(url){
try{
const u=new URL(url);
const h=u.hostname.toLowerCase();
// YouTube -> embed
if(h.includes('youtube.com')||h.includes('youtu.be')){
let vid='';
if(h.includes('youtu.be')){vid=u.pathname.slice(1)}
else{vid=u.searchParams.get('v')}
if(vid)return{type:'embed',url:'https://www.youtube.com/embed/'+vid+'?autoplay=1',label:'YouTube Video Player'};
return{type:'search',url:getProxiedSearchUrl('site:youtube.com '+u.pathname),label:'Search YouTube on Google'};
}
// Google Search -> use igu=1
if(h.includes('google.com')&&u.pathname.includes('/search')){
const q=u.searchParams.get('q')||'';
return{type:'embed',url:getProxiedSearchUrl(q),label:'Google Search'};
}
// Reddit -> old.reddit.com or embed
if(h.includes('reddit.com')){
return{type:'embed',url:url.replace('www.reddit.com','old.reddit.com').replace('reddit.com','old.reddit.com'),label:'Reddit (Old Layout)'};
}
return null;
}catch(e){return null}
}

// ===== PERSISTENCE =====
function loadState(){
try{
const saved=localStorage.getItem('akshitos_state');
if(saved)return JSON.parse(saved);
}catch(e){}
return null;
}
function saveState(){
try{
const toSave={
notes:state.notes,activeNote:state.activeNote,noteCounter:state.noteCounter,
todos:state.todos,todoCounter:state.todoCounter,todoFilter:state.todoFilter,
flashDecks:state.flashDecks,activeDeck:state.activeDeck,
habits:state.habits,habitCounter:state.habitCounter,
grades:state.grades,gradeCounter:state.gradeCounter,
wallpaper:state.wallpaper,customWallpapers:state.customWallpapers,
searchHistory:state.searchHistory,
pomoSessions:state.pomoSessions,
playingSounds:state.playingSounds
};
localStorage.setItem('akshitos_state',JSON.stringify(toSave));
}catch(e){}
}
function wipeAllData(){
try{localStorage.removeItem('akshitos_state')}catch(e){}
closeAllWindows();
Object.assign(state,getDefaultState());
applyWallpaper();
document.getElementById('quote-text').textContent=quotes[Math.floor(Math.random()*quotes.length)];
}
function getDefaultState(){
return{
notes:[{id:1,title:'Welcome Note',content:'Welcome to Akshit OS! 💎\n\nThis is your study workspace.\n\n• Use the Browser to visit real websites\n• Pomodoro for focused sessions\n• Flashcards for memorization\n• Track habits daily\n• Take notes during lectures'}],activeNote:1,noteCounter:1,
todos:[{id:1,text:'Start studying!',done:false,priority:'med'},{id:2,text:'Create flashcards',done:false,priority:'high'},{id:3,text:'Review notes',done:false,priority:'low'}],todoCounter:3,todoFilter:'all',
flashDecks:[{name:'Default',cards:[{front:'What is the powerhouse of the cell?',back:'Mitochondria'},{front:'E = mc² — What does c represent?',back:'Speed of light in vacuum (~3×10⁸ m/s)'}]}],activeDeck:0,activeCard:0,cardFlipped:false,
habits:[{id:1,name:'📖 Read 30 min',days:[false,false,false,false,false,false,false]},{id:2,name:'🏃 Exercise',days:[false,false,false,false,false,false,false]},{id:3,name:'💧 Drink Water',days:[false,false,false,false,false,false,false]}],habitCounter:3,
grades:[{name:'Math',grade:92,weight:4},{name:'Science',grade:88,weight:3}],gradeCounter:2,
wallpaper:'gradient-5',customWallpapers:[],
searchHistory:[],
playingSounds:{},
pomoSessions:0,
windows:{},zIndex:100,activeWindow:null,dragState:null,resizeState:null,
browserTabs:[{id:1,url:'',title:'New Tab',history:[],historyIdx:-1,loading:false,error:false,blockedUrl:''}],
activeBrowserTab:1,browserTabCounter:1,
calcDisplay:'0',calcExpr:'',calcPrev:null,calcOp:null,calcReset:false,
timerMode:'timer',timerSeconds:0,timerRunning:false,timerInterval:null,timerTarget:0,stopwatchMs:0,stopwatchRunning:false,stopwatchInterval:null,
pomoMode:'work',pomoTime:25*60,pomoRunning:false,pomoInterval:null,pomoDurations:{work:25*60,short:5*60,long:15*60}
};
}

const saved=loadState();
const defaults=getDefaultState();
const state=Object.assign({},defaults);
if(saved){
for(const k of['notes','activeNote','noteCounter','todos','todoCounter','todoFilter','flashDecks','activeDeck','habits','habitCounter','grades','gradeCounter','wallpaper','customWallpapers','searchHistory','pomoSessions','playingSounds']){
if(saved[k]!==undefined)state[k]=saved[k];
}
}
if(!state.customWallpapers)state.customWallpapers=[];

const quotes=["The secret of getting ahead is getting started.","Study hard, for the well is deep.","Success is the sum of small efforts repeated daily.","Don't watch the clock; do what it does. Keep going.","Education is the passport to the future.","The beautiful thing about learning is no one can take it away.","Push yourself, because no one else is going to do it for you.","There are no shortcuts to any place worth going.","Discipline is the bridge between goals and accomplishment.","It always seems impossible until it's done."];

function applyWallpaper(){
const bg=document.getElementById('wallpaper-bg');
bg.className='';
if(state.wallpaper&&state.wallpaper.startsWith('gradient-')){
bg.classList.add(state.wallpaper);
bg.style.backgroundImage='';
}else if(state.wallpaper){
bg.style.backgroundImage='url('+state.wallpaper+')';
bg.style.backgroundSize='cover';
bg.style.backgroundPosition='center';
}
}
applyWallpaper();

setInterval(saveState,3000);

function updateClock(){
const n=new Date();
const h=n.getHours().toString().padStart(2,'0');
const m=n.getMinutes().toString().padStart(2,'0');
const s=n.getSeconds().toString().padStart(2,'0');
const clockEl=document.getElementById('clock');
const widgetClock=document.getElementById('widget-clock');
if(clockEl)clockEl.textContent=h+':'+m+':'+s;
if(widgetClock)widgetClock.textContent=h+':'+m;
const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
const ds=days[n.getDay()]+', '+months[n.getMonth()]+' '+n.getDate();
const mdEl=document.getElementById('menu-date');
const wdEl=document.getElementById('widget-date-full');
if(mdEl)mdEl.textContent=ds;
if(wdEl)wdEl.textContent=ds;
}
setInterval(updateClock,1000);
updateClock();
document.getElementById('quote-text').textContent=quotes[Math.floor(Math.random()*quotes.length)];
setInterval(()=>{document.getElementById('quote-text').textContent=quotes[Math.floor(Math.random()*quotes.length)]},30000);

document.getElementById('desktop').addEventListener('contextmenu',e=>{if(e.target.closest('.window')||e.target.closest('#dock')||e.target.closest('#menubar'))return;e.preventDefault();const menu=document.getElementById('context-menu');menu.style.display='block';menu.style.left=Math.min(e.clientX,window.innerWidth-200)+'px';menu.style.top=Math.min(e.clientY,window.innerHeight-200)+'px'});
document.addEventListener('click',()=>{document.getElementById('context-menu').style.display='none'});

function checkFullscreen(){
let anyMaximized=false;
for(const id in state.windows){
if(state.windows[id]&&state.windows[id].maximized){anyMaximized=true;break}
}
const mb=document.getElementById('menubar');
const dk=document.getElementById('dock');
const dw=document.getElementById('desktop-widgets');
if(anyMaximized){
mb.classList.add('hidden');
dk.classList.add('hidden');
if(dw)dw.classList.add('hidden');
}else{
mb.classList.remove('hidden');
dk.classList.remove('hidden');
if(dw)dw.classList.remove('hidden');
}
}

function createWindow(id,title,width,height,content){
if(state.windows[id]){const w=document.getElementById('win-'+id);if(w){w.style.display='flex';w.classList.remove('minimizing');focusWindow(id)}return}
const w=document.createElement('div');w.className='window opening';w.id='win-'+id;
const vw=window.innerWidth,vh=window.innerHeight,ww=Math.min(width,vw-40),wh=Math.min(height,vh-100);
w.style.width=ww+'px';w.style.height=wh+'px';
w.style.left=Math.max(40,(vw-ww)/2+(Object.keys(state.windows).length%5)*30)+'px';
w.style.top=Math.max(40,(vh-wh)/2+(Object.keys(state.windows).length%5)*20)+'px';
w.innerHTML='<div class="window-bg"></div><div class="titlebar" onmousedown="startDrag(event,\''+id+'\')"><div class="titlebar-btns"><div class="titlebar-btn btn-close" onclick="closeWindow(\''+id+'\')"></div><div class="titlebar-btn btn-min" onclick="minimizeWindow(\''+id+'\')"></div><div class="titlebar-btn btn-max" onclick="maximizeWindow(\''+id+'\')"></div></div><div class="titlebar-title">'+title+'</div></div>'+content+'<div class="resize-handle" onmousedown="startResize(event,\''+id+'\')"></div>';
w.addEventListener('mousedown',()=>focusWindow(id));
document.getElementById('desktop').appendChild(w);
state.windows[id]={maximized:false,prevRect:null};focusWindow(id);
const di=document.querySelector('.dock-item[data-app="'+id+'"]');if(di)di.classList.add('active');
setTimeout(()=>w.classList.remove('opening'),400);
}

function closeWindow(id){const w=document.getElementById('win-'+id);if(!w)return;w.classList.add('closing');setTimeout(()=>{w.remove();delete state.windows[id];const di=document.querySelector('.dock-item[data-app="'+id+'"]');if(di)di.classList.remove('active');checkFullscreen()},250);if(id==='timer'){clearInterval(state.timerInterval);clearInterval(state.stopwatchInterval);state.timerRunning=false;state.stopwatchRunning=false}if(id==='pomodoro'){clearInterval(state.pomoInterval);state.pomoRunning=false}saveState();}
function minimizeWindow(id){const w=document.getElementById('win-'+id);if(!w)return;w.classList.add('minimizing');setTimeout(()=>{w.style.display='none';w.classList.remove('minimizing')},350)}
function maximizeWindow(id){const w=document.getElementById('win-'+id);if(!w)return;const s=state.windows[id];if(s.maximized){w.style.left=s.prevRect.left;w.style.top=s.prevRect.top;w.style.width=s.prevRect.width;w.style.height=s.prevRect.height;w.classList.remove('maximized');s.maximized=false}else{s.prevRect={left:w.style.left,top:w.style.top,width:w.style.width,height:w.style.height};w.style.left='0';w.style.top='0';w.style.width='100%';w.style.height='100%';w.classList.add('maximized');s.maximized=true}checkFullscreen()}
function focusWindow(id){state.zIndex++;const w=document.getElementById('win-'+id);if(w)w.style.zIndex=state.zIndex;document.querySelectorAll('.window').forEach(el=>el.classList.remove('focused'));if(w)w.classList.add('focused');state.activeWindow=id}
function closeAllWindows(){Object.keys(state.windows).forEach(id=>closeWindow(id))}

function startDrag(e,id){if(e.target.classList.contains('titlebar-btn'))return;const w=document.getElementById('win-'+id);if(state.windows[id]?.maximized)return;focusWindow(id);const r=w.getBoundingClientRect();state.dragState={id,offsetX:e.clientX-r.left,offsetY:e.clientY-r.top};e.preventDefault()}
function startResize(e,id){const w=document.getElementById('win-'+id);if(!w)return;focusWindow(id);const r=w.getBoundingClientRect();state.resizeState={id,startX:e.clientX,startY:e.clientY,startW:r.width,startH:r.height};e.preventDefault();e.stopPropagation()}
document.addEventListener('mousemove',e=>{if(state.dragState){const w=document.getElementById('win-'+state.dragState.id);if(w){w.style.left=(e.clientX-state.dragState.offsetX)+'px';w.style.top=Math.max(0,e.clientY-state.dragState.offsetY)+'px'}}if(state.resizeState){const w=document.getElementById('win-'+state.resizeState.id);if(w){const nw=Math.max(380,state.resizeState.startW+e.clientX-state.resizeState.startX);const nh=Math.max(280,state.resizeState.startH+e.clientY-state.resizeState.startY);w.style.width=nw+'px';w.style.height=nh+'px'}}});
document.addEventListener('mouseup',()=>{state.dragState=null;state.resizeState=null});

document.addEventListener('keydown',e=>{
if(e.key==='Escape'){
for(const id in state.windows){
if(state.windows[id]&&state.windows[id].maximized){
maximizeWindow(id);break;
}
}
}
});

function onIframeLoad(tabId){
const tab=state.browserTabs.find(t=>t.id===tabId);
if(!tab)return;
tab.loading=false;
clearTimeout(tab._loadTimeout);
try{
const iframe=document.getElementById('browser-iframe-'+tabId);
if(iframe){
const doc=iframe.contentDocument;
if(doc){
// Check if it's a blank/error page
if(doc.body&&doc.body.innerHTML.trim()===''){
tab.error=true;
tab.blockedUrl=tab.url;
renderBrowser();
return;
}
tab.title=doc.title||tab.url.replace(/^https?:\/\//,'').split('/')[0];
}
}
}catch(e){
// Cross-origin means it loaded successfully
tab.title=tab.url.replace(/^https?:\/\//,'').split('/')[0];
}
renderBrowserTabs();
}

function normalizeUrl(input){
input=input.trim();
if(!input)return'';
if(/^https?:\/\//i.test(input))return input;
if(/^[a-zA-Z0-9][-a-zA-Z0-9]*\.[a-zA-Z]{2,}/.test(input))return'https://'+input;
return getProxiedSearchUrl(input);
}

function browserGoDirectUrl(url){
const tab=getActiveTab();if(!tab)return;
tab.url=url;tab.title=url.replace(/^https?:\/\//,'').split('/')[0];
tab.loading=true;tab.error=false;tab.blockedUrl='';
tab.historyIdx++;tab.history=tab.history.slice(0,tab.historyIdx);tab.history.push(url);
renderBrowser();
}

function browserGo(input){
if(!input||!input.trim())return;
const tab=getActiveTab();if(!tab)return;
let url=normalizeUrl(input);

// Check if site is known to be blocked and auto-convert
if(isLikelyBlocked(url)){
const alt=getAlternativeUrl(url);
if(alt&&alt.type==='embed'){
// Auto-convert (e.g., YouTube -> embed, Google Search -> igu=1)
tab.url=alt.url;
tab.title=alt.label;
tab.loading=true;tab.error=false;tab.blockedUrl='';
tab.historyIdx++;tab.history=tab.history.slice(0,tab.historyIdx);tab.history.push(alt.url);
if(!state.searchHistory.includes(input)){state.searchHistory.unshift(input);if(state.searchHistory.length>20)state.searchHistory.pop()}
saveState();renderBrowser();
return;
}
// Show blocked page immediately
tab.url=url;tab.title=url.replace(/^https?:\/\//,'').split('/')[0];
tab.loading=false;tab.error=true;tab.blockedUrl=url;
tab.historyIdx++;tab.history=tab.history.slice(0,tab.historyIdx);tab.history.push(url);
if(!state.searchHistory.includes(url)){state.searchHistory.unshift(url);if(state.searchHistory.length>20)state.searchHistory.pop()}
saveState();renderBrowser();
return;
}

tab.url=url;tab.title=url.replace(/^https?:\/\//,'').split('/')[0];
tab.loading=true;tab.error=false;tab.blockedUrl='';
tab.historyIdx++;tab.history=tab.history.slice(0,tab.historyIdx);tab.history.push(url);
if(!state.searchHistory.includes(url)){state.searchHistory.unshift(url);if(state.searchHistory.length>20)state.searchHistory.pop()}
saveState();renderBrowser();
}

function browserForward(){const tab=getActiveTab();if(!tab||tab.historyIdx>=tab.history.length-1)return;tab.historyIdx++;tab.url=tab.history[tab.historyIdx]||'';tab.title=tab.url?tab.url.replace(/^https?:\/\//,'').split('/')[0]:'New Tab';tab.error=false;tab.blockedUrl='';tab.loading=!!tab.url;renderBrowser()}

function openCalculator(){createWindow('calculator','Calculator',320,460,'<div class="window-body" style="display:flex;flex-direction:column"><div class="calc-display"><div class="calc-expr" id="calc-expr"></div><div id="calc-display">0</div></div><div class="calc-grid"><button class="calc-btn fn" onclick="calcFn(\'AC\')">AC</button><button class="calc-btn fn" onclick="calcFn(\'±\')">±</button><button class="calc-btn fn" onclick="calcFn(\'%\')">%</button><button class="calc-btn op" onclick="calcOp(\'÷\')">÷</button><button class="calc-btn num" onclick="calcNum(\'7\')">7</button><button class="calc-btn num" onclick="calcNum(\'8\')">8</button><button class="calc-btn num" onclick="calcNum(\'9\')">9</button><button class="calc-btn op" onclick="calcOp(\'×\')">×</button><button class="calc-btn num" onclick="calcNum(\'4\')">4</button><button class="calc-btn num" onclick="calcNum(\'5\')">5</button><button class="calc-btn num" onclick="calcNum(\'6\')">6</button><button class="calc-btn op" onclick="calcOp(\'−\')">−</button><button class="calc-btn num" onclick="calcNum(\'1\')">1</button><button class="calc-btn num" onclick="calcNum(\'2\')">2</button><button class="calc-btn num" onclick="calcNum(\'3\')">3</button><button class="calc-btn op" onclick="calcOp(\'+\')">+</button><button class="calc-btn num" onclick="calcNum(\'0\')" style="grid-column:span 2">0</button><button class="calc-btn num" onclick="calcNum(\'.\')">.</button><button class="calc-btn eq" onclick="calcEq()">=</button></div></div>')}
function calcNum(n){if(state.calcReset){state.calcDisplay='0';state.calcReset=false}if(n==='.'&&state.calcDisplay.includes('.'))return;state.calcDisplay=state.calcDisplay==='0'&&n!=='.'?n:state.calcDisplay+n;document.getElementById('calc-display').textContent=state.calcDisplay}
function calcOp(op){state.calcPrev=parseFloat(state.calcDisplay);state.calcOp=op;state.calcExpr=state.calcDisplay+' '+op;state.calcReset=true;document.getElementById('calc-expr').textContent=state.calcExpr}
function calcFn(fn){if(fn==='AC'){state.calcDisplay='0';state.calcExpr='';state.calcPrev=null;state.calcOp=null}if(fn==='±')state.calcDisplay=String(-parseFloat(state.calcDisplay));if(fn==='%')state.calcDisplay=String(parseFloat(state.calcDisplay)/100);document.getElementById('calc-display').textContent=state.calcDisplay;document.getElementById('calc-expr').textContent=state.calcExpr}
function calcEq(){if(state.calcPrev===null||!state.calcOp)return;const b=parseFloat(state.calcDisplay);let r;switch(state.calcOp){case'+':r=state.calcPrev+b;break;case'−':r=state.calcPrev-b;break;case'×':r=state.calcPrev*b;break;case'÷':r=b!==0?state.calcPrev/b:'Error';break}state.calcExpr=state.calcPrev+' '+state.calcOp+' '+b+' =';state.calcDisplay=typeof r==='number'?String(Math.round(r*1e10)/1e10):r;state.calcPrev=null;state.calcOp=null;state.calcReset=true;document.getElementById('calc-display').textContent=state.calcDisplay;document.getElementById('calc-expr').textContent=state.calcExpr}

// ========== TODO ==========
function openTodo(){createWindow('todo','To-Do List',480,500,'<div class="window-body"><div class="todo-container"><div class="todo-input-row"><input class="todo-input" id="todo-input" placeholder="Add a new task..." onkeydown="if(event.key===\'Enter\')addTodo()"><select id="todo-priority" style="padding:8px 12px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#fff;font-size:12px;outline:none"><option value="low">🟢 Low</option><option value="med" selected>🟡 Med</option><option value="high">🔴 High</option></select><button class="todo-add-btn" onclick="addTodo()">Add</button></div><div class="todo-filters" id="todo-filters"></div><div class="todo-list" id="todo-list"></div></div></div>');renderTodos()}
function renderTodos(){const list=document.getElementById('todo-list'),filters=document.getElementById('todo-filters');if(!list)return;if(filters)filters.innerHTML=['all','active','done'].map(f=>'<button class="todo-filter '+(state.todoFilter===f?'active':'')+'" onclick="state.todoFilter=\''+f+'\';renderTodos()">'+f.charAt(0).toUpperCase()+f.slice(1)+'</button>').join('');let todos=state.todos;if(state.todoFilter==='active')todos=todos.filter(t=>!t.done);if(state.todoFilter==='done')todos=todos.filter(t=>t.done);list.innerHTML=todos.map(t=>'<div class="todo-item '+(t.done?'done':'')+'" onclick="toggleTodo('+t.id+')"><div class="todo-check">'+(t.done?'✓':'')+'</div><div class="todo-text">'+t.text+'</div><span class="todo-priority priority-'+t.priority+'">'+t.priority.toUpperCase()+'</span><span class="todo-delete" onclick="event.stopPropagation();deleteTodo('+t.id+')">✕</span></div>').join('')||'<div style="text-align:center;color:var(--text2);padding:40px;font-size:14px">No tasks yet! 🎉</div>'}
function addTodo(){const inp=document.getElementById('todo-input'),pri=document.getElementById('todo-priority');if(!inp||!inp.value.trim())return;state.todoCounter++;state.todos.unshift({id:state.todoCounter,text:inp.value.trim(),done:false,priority:pri.value});inp.value='';renderTodos();saveState()}
function toggleTodo(id){const t=state.todos.find(x=>x.id===id);if(t)t.done=!t.done;renderTodos();saveState()}
function deleteTodo(id){state.todos=state.todos.filter(t=>t.id!==id);renderTodos();saveState()}

// ========== FLASHCARDS ==========
function openFlashcards(){createWindow('flashcards','Flashcards',520,440,'<div class="window-body"><div class="flash-container" id="flash-container"></div></div>');renderFlashcards()}
function renderFlashcards(){const el=document.getElementById('flash-container');if(!el)return;const deck=state.flashDecks[state.activeDeck],card=deck?.cards[state.activeCard];let deckHtml='';state.flashDecks.forEach((d,i)=>{deckHtml+='<div class="flash-deck '+(i===state.activeDeck?'active':'')+'" onclick="state.activeDeck='+i+';state.activeCard=0;state.cardFlipped=false;renderFlashcards()">'+d.name+' ('+d.cards.length+')</div>'});el.innerHTML='<div class="flash-deck-bar">'+deckHtml+'<div class="flash-deck" onclick="addFlashDeck()">+ Deck</div></div><div class="flash-card-area">'+(card?'<div class="flash-card '+(state.cardFlipped?'flipped':'')+'" onclick="state.cardFlipped=!state.cardFlipped;renderFlashcards()"><div class="flash-face flash-front">'+card.front+'</div><div class="flash-face flash-back">'+card.back+'</div></div>':'<div style="color:var(--text2);text-align:center">No cards yet. Add some below! 🃏</div>')+'</div><div class="flash-nav"><button onclick="prevCard()">← Prev</button><span class="flash-counter">'+(deck&&deck.cards.length>0?(state.activeCard+1)+' / '+deck.cards.length:'0 / 0')+'</span><button onclick="nextCard()">Next →</button><button onclick="shuffleCards()">🔀</button></div><div class="flash-add"><input id="flash-front" placeholder="Question / Front"><input id="flash-back" placeholder="Answer / Back"><button onclick="addFlashcard()" style="padding:8px 14px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:12px;white-space:nowrap">+ Add</button></div>'}
function prevCard(){const d=state.flashDecks[state.activeDeck];if(!d||d.cards.length===0)return;state.activeCard=(state.activeCard-1+d.cards.length)%d.cards.length;state.cardFlipped=false;renderFlashcards()}
function nextCard(){const d=state.flashDecks[state.activeDeck];if(!d||d.cards.length===0)return;state.activeCard=(state.activeCard+1)%d.cards.length;state.cardFlipped=false;renderFlashcards()}
function shuffleCards(){const d=state.flashDecks[state.activeDeck];if(!d)return;for(let i=d.cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d.cards[i],d.cards[j]]=[d.cards[j],d.cards[i]]}state.activeCard=0;state.cardFlipped=false;renderFlashcards();saveState()}
function addFlashcard(){const f=document.getElementById('flash-front'),b=document.getElementById('flash-back');if(!f||!b||!f.value.trim()||!b.value.trim())return;state.flashDecks[state.activeDeck].cards.push({front:f.value.trim(),back:b.value.trim()});f.value='';b.value='';state.activeCard=state.flashDecks[state.activeDeck].cards.length-1;state.cardFlipped=false;renderFlashcards();saveState()}
function addFlashDeck(){const n=prompt('Deck name:');if(!n)return;state.flashDecks.push({name:n,cards:[]});state.activeDeck=state.flashDecks.length-1;state.activeCard=0;state.cardFlipped=false;renderFlashcards();saveState()}

// ========== HABITS ==========
function openHabits(){createWindow('habits','Habit Tracker',560,400,'<div class="window-body"><div class="habit-container" id="habit-container"></div></div>');renderHabits()}
function renderHabits(){const el=document.getElementById('habit-container');if(!el)return;const dl=['M','T','W','T','F','S','S'];let habitsHtml='';state.habits.forEach(h=>{let daysHtml='';h.days.forEach((d,i)=>{daysHtml+='<div class="habit-day '+(d?'checked':'')+'" onclick="toggleHabit('+h.id+','+i+')">'+(d?'✓':dl[i])+'</div>'});habitsHtml+='<div class="habit-item"><div class="habit-name">'+h.name+'</div><div class="habit-days">'+daysHtml+'</div><div class="habit-streak">🔥 '+h.days.filter(Boolean).length+'/7</div></div>'});el.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center"><h3 style="font-size:16px;font-weight:600;color:#fff">📊 Weekly Habits</h3><button onclick="addHabit()" style="padding:8px 16px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:12px;cursor:pointer;font-weight:600">+ Add</button></div><div style="display:flex;flex-direction:column;gap:6px;flex:1;overflow-y:auto">'+habitsHtml+'</div>'}
function toggleHabit(id,day){const h=state.habits.find(x=>x.id===id);if(h){h.days[day]=!h.days[day];renderHabits();saveState()}}
function addHabit(){const n=prompt('Habit name (e.g. 📖 Read 30 min):');if(!n)return;state.habitCounter++;state.habits.push({id:state.habitCounter,name:n,days:[false,false,false,false,false,false,false]});renderHabits();saveState()}

// ========== GRADES ==========
function openGrades(){createWindow('grades','Grade Calculator',460,420,'<div class="window-body"><div class="grade-container" id="grade-container"></div></div>');renderGrades()}
function renderGrades(){const el=document.getElementById('grade-container');if(!el)return;const tw=state.grades.reduce((s,g)=>s+g.weight,0),ws=state.grades.reduce((s,g)=>s+g.grade*g.weight,0),gpa=tw>0?ws/tw:0;let gradeListHtml='';state.grades.forEach((g,i)=>{gradeListHtml+='<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:14px;background:rgba(255,255,255,0.04)"><span style="flex:1;font-size:13px">'+g.name+'</span><span style="font-size:13px;color:var(--accent2);font-weight:600">'+g.grade+'%</span><span style="font-size:11px;color:var(--text2)">×'+g.weight+'</span><span style="cursor:pointer;opacity:0.5;font-size:12px" onclick="state.grades.splice('+i+',1);renderGrades();saveState()">✕</span></div>'});el.innerHTML='<div class="grade-result"><div class="gpa">'+gpa.toFixed(1)+'%</div><div class="label">Weighted Average</div></div><div style="display:flex;gap:8px"><input class="grade-input" id="grade-name" placeholder="Subject"><input class="grade-input" id="grade-score" placeholder="Score %" type="number" style="width:80px"><input class="grade-input" id="grade-weight" placeholder="Credits" type="number" style="width:80px"><button onclick="addGrade()" style="padding:8px 14px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:20px;white-space:nowrap">+</button></div><div class="grade-list">'+gradeListHtml+'</div>'}
function addGrade(){const n=document.getElementById('grade-name'),s=document.getElementById('grade-score'),w=document.getElementById('grade-weight');if(!n||!n.value.trim())return;state.grades.push({name:n.value.trim(),grade:parseFloat(s.value)||0,weight:parseFloat(w.value)||1});renderGrades();saveState()}

// ========== MUSIC ==========
function openMusic(){createWindow('music','Ambient Sounds',420,420,'<div class="window-body"><div class="music-container"><h3 style="font-size:16px;font-weight:600;color:#fff">🎵 Focus Sounds</h3><p style="font-size:12px;color:var(--text2)">Click tiles to toggle ambient modes</p><div class="music-grid" id="music-grid"></div></div></div>');renderMusic()}
function renderMusic(){const el=document.getElementById('music-grid');if(!el)return;const sounds=[{id:'rain',emoji:'🌧️',name:'Rain'},{id:'thunder',emoji:'⛈️',name:'Thunder'},{id:'waves',emoji:'🌊',name:'Waves'},{id:'birds',emoji:'🐦',name:'Birds'},{id:'fire',emoji:'🔥',name:'Fireplace'},{id:'wind',emoji:'💨',name:'Wind'},{id:'cafe',emoji:'☕',name:'Café'},{id:'night',emoji:'🌙',name:'Night'},{id:'forest',emoji:'🌲',name:'Forest'}];el.innerHTML=sounds.map(s=>'<div class="music-tile '+(state.playingSounds[s.id]?'playing':'')+'" onclick="toggleSound(\''+s.id+'\')">'+s.emoji+'<span>'+s.name+'</span>'+(state.playingSounds[s.id]?'<span style="font-size:9px;color:var(--accent2)">Playing</span>':'')+'</div>').join('')}
function toggleSound(id){state.playingSounds[id]=!state.playingSounds[id];if(!state.playingSounds[id])delete state.playingSounds[id];renderMusic();saveState()}

// ========== SETTINGS ==========
function openSettings(){createWindow('settings','Settings',560,520,'<div class="window-body"><div class="settings-container" id="settings-container"></div></div>');renderSettings()}
function renderSettings(){
const el=document.getElementById('settings-container');if(!el)return;
const gradients=['gradient-1','gradient-2','gradient-3','gradient-4','gradient-5','gradient-6','gradient-7','gradient-8'];
let wpGrid='';
gradients.forEach(w=>{
wpGrid+='<div class="wallpaper-option '+w+' '+(state.wallpaper===w?'active':'')+'" onclick="setWallpaper(\''+w+'\')"></div>';
});

let customThumbsHtml='';
if(state.customWallpapers&&state.customWallpapers.length>0){
customThumbsHtml='<div class="custom-wp-thumbs">';
state.customWallpapers.forEach((wp,i)=>{
const isActive=state.wallpaper===wp;
customThumbsHtml+='<div class="custom-wp-thumb '+(isActive?'active':'')+'" style="background-image:url('+wp+')" onclick="setWallpaper(state.customWallpapers['+i+'])"><div class="remove-wp" onclick="event.stopPropagation();removeCustomWallpaper('+i+')">✕</div></div>';
});
customThumbsHtml+='</div>';
}

el.innerHTML=
'<div class="settings-section">'+
'<h3>🎨 Wallpaper</h3>'+
'<p>Choose a built-in gradient</p>'+
'<div class="wallpaper-grid">'+wpGrid+'</div>'+
'</div>'+
'<div class="settings-section">'+
'<h3>📁 Custom Wallpaper</h3>'+
'<p>Upload an image from your device (max 5 images stored)</p>'+
'<div class="custom-wp-area">'+
'<div class="custom-wp-btn" onclick="uploadWallpaper()">📂 Choose Image from Storage</div>'+
customThumbsHtml+
'</div>'+
'</div>'+
'<div class="settings-section danger-section">'+
'<h3>⚠️ Data Management</h3>'+
'<p>This will permanently erase all notes, todos, flashcards, habits, grades, custom wallpapers, and settings.</p>'+
'<button class="danger-btn" onclick="confirmWipeData()">🗑 Wipe All Data</button>'+
'</div>';
}

function setWallpaper(w){state.wallpaper=w;applyWallpaper();saveState();renderSettings()}

function uploadWallpaper(){
const inp=document.getElementById('hidden-file-input');
inp.onchange=function(e){
const file=e.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=function(ev){
const dataUrl=ev.target.result;
if(!state.customWallpapers)state.customWallpapers=[];
if(state.customWallpapers.length>=5)state.customWallpapers.shift();
state.customWallpapers.push(dataUrl);
state.wallpaper=dataUrl;
applyWallpaper();
saveState();
renderSettings();
};
reader.readAsDataURL(file);
inp.value='';
};
inp.click();
}

function removeCustomWallpaper(i){
const removed=state.customWallpapers.splice(i,1)[0];
if(state.wallpaper===removed){state.wallpaper='gradient-5';applyWallpaper()}
saveState();renderSettings();
}

function confirmWipeData(){
const overlay=document.createElement('div');
overlay.className='confirm-overlay';
overlay.id='confirm-overlay';
overlay.innerHTML='<div class="confirm-dialog">'+
'<h3>⚠️ Wipe All Data?</h3>'+
'<p>This will permanently delete all your notes, to-dos, flashcards, habits, grades, custom wallpapers, and settings. This action cannot be undone.</p>'+
'<div class="confirm-btns">'+
'<button style="background:rgba(255,255,255,0.08);color:var(--text2)" onclick="document.getElementById(\'confirm-overlay\').remove()">Cancel</button>'+
'<button style="background:rgba(255,95,87,0.8);color:#fff" onclick="document.getElementById(\'confirm-overlay\').remove();wipeAllData()">Wipe Everything</button>'+
'</div></div>';
document.body.appendChild(overlay);
}
</script>
</body>
</html>
